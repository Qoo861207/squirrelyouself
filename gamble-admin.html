<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>獎池後台</title>
  <style>
    :root {
      --bg: #16110f;
      --panel: #2a2421;
      --panel2: #35302d;
      --text: #fff8ef;
      --muted: #cdbbad;
      --line: rgba(255,255,255,0.12);
      --common: #f5f1e8;
      --uncommon: #68d889;
      --rare: #72b8ff;
      --epic: #c47dff;
      --legendary: #ffd36f;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", sans-serif;
      background: radial-gradient(circle at top, rgba(255, 204, 128, 0.14), transparent 35%), var(--bg);
      color: var(--text);
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto;
      display: grid;
      gap: 18px;
    }

    .topbar, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .topbar {
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3.8rem); }
    .subtitle { color: var(--muted); margin-top: 6px; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button, a.button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      cursor: pointer;
      color: #1b120d;
      background: #f2bf7b;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    button.danger { background: #d9534f; color: white; }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 14px;
    }
    .stat {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .stat-label { color: var(--muted); font-size: 0.9rem; }
    .stat-value { font-size: 2rem; font-weight: 900; margin-top: 6px; }

    .panel { padding: 18px; }
    .panel h2 { margin: 0 0 14px; }

    .latest {
      min-height: 150px;
      display: grid;
      align-items: center;
      padding: 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
    }
    .latest-name { font-size: clamp(2rem, 6vw, 4.4rem); font-weight: 950; line-height: 1; }
    .latest-meta { color: var(--muted); margin-top: 10px; font-size: 1.05rem; }

    .rarity-common { color: var(--common); }
    .rarity-uncommon { color: var(--uncommon); }
    .rarity-rare { color: var(--rare); }
    .rarity-epic { color: var(--epic); }
    .rarity-legendary { color: var(--legendary); }

    .customer-summary-list { display: grid; gap: 12px; }
    .customer-summary {
      display: grid;
      grid-template-columns: minmax(180px, 0.8fr) 1.7fr;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      border-radius: 18px;
    }
    .customer-title { font-size: 1.25rem; font-weight: 900; }
    .customer-meta { color: var(--muted); margin-top: 6px; line-height: 1.7; }
    .prize-counts { display: flex; flex-wrap: wrap; gap: 8px; align-content: start; }
    .prize-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.16);
      font-weight: 800;
      white-space: nowrap;
    }

    .result-list { display: grid; gap: 10px; }
    .result {
      display: grid;
      grid-template-columns: 1.4fr 1fr 0.7fr 1fr;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      border-radius: 16px;
    }
    .result-name { font-weight: 900; font-size: 1.1rem; }
    .muted { color: var(--muted); }

    .empty {
      color: var(--muted);
      padding: 24px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 16px;
    }

    @media (max-width: 820px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .result { grid-template-columns: 1fr; }
      .customer-summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div>
        <h1 id="pageTitle">獎池後台</h1>
        <div class="subtitle" id="pageSubtitle">即時顯示 Gamble 抽獎結果。此頁為 Ver005 測試用。</div>
      </div>
      <div class="actions">
        <a class="button" id="backAdminLink" href="/admin.html">返回座位後台</a>
        <a class="button" id="openGambleLink" href="/Gamble/" target="_blank" rel="noopener noreferrer">打開抽獎頁</a>
        <button class="danger" onclick="clearResults()">清空獎池紀錄</button>
      </div>
    </section>

    <section class="stats" id="stats"></section>

    <section class="panel">
      <h2>最新抽獎</h2>
      <div class="latest" id="latestBox">
        <div>
          <div class="latest-name muted">尚未有抽獎紀錄</div>
          <div class="latest-meta">等待前台抽獎結果回傳。</div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>客人抽獎彙總</h2>
      <div class="customer-summary-list" id="customerSummaryList"></div>
    </section>

    <section class="panel">
      <h2>最近紀錄</h2>
      <div class="result-list" id="resultList"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ADMIN_SCOPE = params.get('scope') === 'night' ? 'night' : 'main';
    const ADMIN_NAME = ADMIN_SCOPE === 'night' ? '松夜鼠堂' : '松你去鼠';

    const drawStatDefinitions = [
      { label: '抽卡：銘謝惠顧 / 白', names: ['銘謝惠顧'], className: 'rarity-common' },
      { label: '抽卡：折價卷 / 白', names: ['折價卷'], className: 'rarity-common' },
      { label: '抽卡：再抽一次 / 綠', names: ['再抽一次'], className: 'rarity-uncommon' },
      { label: '抽卡：1萬G / 綠', names: ['1萬G'], className: 'rarity-uncommon' },
      { label: '抽卡：3萬G / 綠', names: ['3萬G'], className: 'rarity-uncommon' },
      { label: '抽卡：原地休息', names: ['原地休息'], className: 'rarity-common' },
      { label: '抽卡：前進一格', names: ['前進一格'], className: 'rarity-uncommon' },
      { label: '抽卡：前進兩格', names: ['前進兩格'], className: 'rarity-uncommon' },
      { label: '抽卡：前進三格', names: ['前進三格'], className: 'rarity-uncommon' },
      { label: '抽卡：後退一格', names: ['後退一格'], className: 'rarity-common' },
      { label: '抽卡：後退兩格', names: ['後退兩格'], className: 'rarity-common' },
      { label: '抽卡：15萬G / 綠', names: ['15萬G'], className: 'rarity-uncommon' },
      { label: '抽卡：30萬G / 藍', names: ['30萬G'], className: 'rarity-rare' },
      { label: '抽卡：50萬G / 紫', names: ['50萬G'], className: 'rarity-epic' },
      { label: '抽卡：100萬G / 黃金', names: ['100萬G大獎', '100萬G'], className: 'rarity-legendary' }
    ];

    const boardStatDefinitions = [
      { label: '地圖：原地休息', names: ['原地休息'], className: 'rarity-common' },
      { label: '地圖：折價卷', names: ['折價卷'], className: 'rarity-common' },
      { label: '地圖：1萬G', names: ['1萬G'], className: 'rarity-uncommon' },
      { label: '地圖：3萬G', names: ['3萬G'], className: 'rarity-uncommon' },
      { label: '地圖：5萬G', names: ['5萬G'], className: 'rarity-uncommon' },
      { label: '地圖：10萬G', names: ['10萬G'], className: 'rarity-rare' },
      { label: '地圖：30萬G', names: ['30萬G'], className: 'rarity-rare' },
      { label: '地圖：前進一格', names: ['前進一格'], className: 'rarity-uncommon' },
      { label: '地圖：前進兩格', names: ['前進兩格'], className: 'rarity-uncommon' },
      { label: '地圖：前進三格', names: ['前進三格'], className: 'rarity-uncommon' },
      { label: '地圖：後退一格', names: ['後退一格'], className: 'rarity-common' },
      { label: '地圖：後退兩格', names: ['後退兩格'], className: 'rarity-common' },
      { label: '地圖：START 100萬G', names: ['START 大獎', '100萬G大獎', '100萬G'], className: 'rarity-legendary' }
    ];

    let results = [];

    function setupAdminScope() {
      document.title = `${ADMIN_NAME}獎池後台`;
      document.getElementById('pageTitle').textContent = `${ADMIN_NAME}獎池後台`;
      document.getElementById('pageSubtitle').textContent = `即時顯示 ${ADMIN_NAME} 的抽獎結果。此頁為 Ver005 測試用。`;
      document.getElementById('backAdminLink').href = ADMIN_SCOPE === 'night' ? '/Night/adminNight.html' : '/admin.html';
      document.getElementById('backAdminLink').textContent = ADMIN_SCOPE === 'night' ? '返回松夜鼠堂後台' : '返回座位後台';
      document.getElementById('openGambleLink').href = ADMIN_SCOPE === 'night' ? '/Night/gambleNight.html' : '/Gamble/';
    }

    function resultBelongsToScope(result) {
      const seat = String(result?.seat || '');
      const isNight = seat.startsWith('Night#');
      return ADMIN_SCOPE === 'night' ? isNight : !isNight;
    }

    function formatPercent(value) {
      const number = Number(value || 0);
      return Number.isInteger(number) ? String(number) : String(number).replace(/\.0+$/, '');
    }

    function normalizePrizeName(name) {
      return String(name || '').replace(/\s+/g, '').trim();
    }

    function isBoardResult(result) {
      const type = String(result?.type || '');
      return type.includes('大富翁地圖') || Boolean(result?.boardTile) || Boolean(result?.boardPosition);
    }

    function countByNames(items, names) {
      const normalizedNames = names.map(normalizePrizeName);
      return items.filter(item => normalizedNames.includes(normalizePrizeName(item.name))).length;
    }

    function renderStatCard(label, value, className = '') {
      return `<div class="stat"><div class="stat-label ${className}">${label}</div><div class="stat-value">${value}</div></div>`;
    }

    function renderCustomerSummaries() {
      const grouped = new Map();
      results.forEach(result => {
        const seat = result.seat || '未指定';
        const customer = result.customer || '未記錄';
        const key = customer !== '未記錄' ? `customer__${customer}` : `seat__${seat}`;
        if (!grouped.has(key)) {
          grouped.set(key, {
            seat,
            customer,
            seats: new Set([seat]),
            total: 0,
            prizes: {},
            latestAt: result.createdAt || ''
          });
        }
        const group = grouped.get(key);
        group.seats.add(seat);
        group.total += 1;
        group.prizes[result.name] = (group.prizes[result.name] || 0) + 1;
        if (!group.latestAt && result.createdAt) group.latestAt = result.createdAt;
      });

      const summaries = Array.from(grouped.values());
      document.getElementById('customerSummaryList').innerHTML = summaries.length
        ? summaries.map(group => {
            const prizeHtml = Object.entries(group.prizes)
              .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-Hant'))
              .map(([name, count]) => `<span class="prize-pill">${name} x${count}</span>`)
              .join('');
            return `
              <div class="customer-summary">
                <div>
                  <div class="customer-title">${group.customer}</div>
                  <div class="customer-meta">座位 ${Array.from(group.seats).join('、')}<br>總共抽到 ${group.total} 項</div>
                </div>
                <div class="prize-counts">${prizeHtml}</div>
              </div>
            `;
          }).join('')
        : '<div class="empty">目前還沒有可以彙總的抽獎紀錄。</div>';
    }

    function render() {
      const drawResults = results.filter(result => !isBoardResult(result));
      const boardResults = results.filter(isBoardResult);

      document.getElementById('stats').innerHTML = [
        renderStatCard('總紀錄數', results.length),
        renderStatCard('抽卡紀錄數', drawResults.length),
        renderStatCard('大富翁地圖紀錄數', boardResults.length),
        ...drawStatDefinitions.map(item =>
          renderStatCard(item.label, countByNames(drawResults, item.names), item.className)
        ),
        ...boardStatDefinitions.map(item =>
          renderStatCard(item.label, countByNames(boardResults, item.names), item.className)
        )
      ].join('');

      const latest = results[0];
      if (latest) {
        document.getElementById('latestBox').innerHTML = `
          <div>
            <div class="latest-name rarity-${latest.rarity}">${latest.name}</div>
            <div class="latest-meta">${latest.type || '未知類型'}｜機率 ${formatPercent(latest.chance)}%｜第 ${latest.spinIndex || '-'} 抽｜${latest.createdAt || ''}</div>
          </div>
        `;
      }
      else {
        document.getElementById('latestBox').innerHTML = `
          <div>
            <div class="latest-name muted">尚未有抽獎紀錄</div>
            <div class="latest-meta">等待前台抽獎結果回傳。</div>
          </div>
        `;
      }

      renderCustomerSummaries();

      document.getElementById('resultList').innerHTML = results.length
        ? results.map(result => `
            <div class="result">
              <div>
                <div class="result-name rarity-${result.rarity}">${result.name}</div>
                <div class="muted">${result.caseName || '松你去鼠抽獎箱'}｜座位 ${result.seat || '未指定'}｜客人 ${result.customer || '未記錄'}</div>
              </div>
              <div>${result.type || '未知類型'}</div>
              <div>機率 ${formatPercent(result.chance)}%｜剩餘 ${Number(result.raffleRemaining || 0)} 次${Number(result.bonusDrawGranted || 0) ? '｜已回補 1 次' : ''}</div>
              <div class="muted">${result.createdAt || ''}</div>
            </div>
          `).join('')
        : '<div class="empty">目前還沒有抽獎紀錄。</div>';
    }

    async function loadResults() {
      const res = await fetch(`/gamble-results?scope=${ADMIN_SCOPE}`);
      const data = await res.json();
      results = Array.isArray(data.results) ? data.results : [];
      render();
    }

    async function clearResults() {
      if (!confirm('要清空獎池紀錄嗎？')) return;
      await fetch(`/gamble-results/clear?scope=${ADMIN_SCOPE}`, { method: 'POST' });
      results = [];
      render();
    }

    function connectEvents() {
      const source = new EventSource('/gamble-events');
      source.onmessage = event => {
        const data = JSON.parse(event.data || '{}');
        if (data.type === 'gamble-result' && data.result) {
          if (!resultBelongsToScope(data.result)) return;
          results.unshift(data.result);
          results = results.slice(0, 200);
          render();
        }
        if (data.type === 'gamble-clear') {
          if (data.scope && data.scope !== ADMIN_SCOPE && data.scope !== 'all') return;
          results = [];
          render();
        }
      };
    }

    setupAdminScope();
    loadResults();
    connectEvents();
  </script>
</body>
</html>
