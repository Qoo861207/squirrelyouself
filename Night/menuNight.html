<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>松夜鼠堂｜點餐入口確認中</title>
  <style>
    :root {
      --bg: #120a12;
      --ink: #fff8ec;
      --muted: rgba(255, 248, 236, 0.72);
      --gold: #f6c477;
      --line: rgba(246, 196, 119, 0.32);
      --panel: rgba(18, 10, 18, 0.72);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 241, 205, 0.28), transparent 24rem),
        radial-gradient(circle at 82% 12%, rgba(155, 38, 83, 0.42), transparent 30rem),
        linear-gradient(135deg, #261d27 0%, #120a12 55%, #260a1a 100%);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.22) 1px, transparent 1px);
      background-size: 42px 42px;
      opacity: .18;
      animation: drift 16s linear infinite;
    }
    @keyframes drift {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(-42px,42px,0); }
    }
    main {
      position: relative;
      width: min(760px, calc(100vw - 32px));
      padding: clamp(32px, 6vw, 64px);
      border: 1px solid var(--line);
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,.08), rgba(0,0,0,.18)), var(--panel);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
      backdrop-filter: blur(10px);
    }
    .eyebrow {
      color: var(--gold);
      letter-spacing: .28em;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 78px);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }
    p {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.9;
      font-weight: 700;
    }
    .status {
      margin-top: 28px;
      padding: 18px 20px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      color: var(--ink);
      font-weight: 800;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    button, a {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 22px;
      background: rgba(255,255,255,.08);
      color: var(--ink);
      text-decoration: none;
      font-weight: 900;
      cursor: pointer;
      transition: transform .22s ease, background .22s ease, border-color .22s ease;
    }
    button:hover, a:hover {
      transform: translateY(-2px);
      background: rgba(246,196,119,.2);
      border-color: rgba(246,196,119,.7);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Moonlit Entrance</div>
    <h1>確認營業狀態中</h1>
    <p>正在確認松夜鼠堂是否開放點餐。如果目前尚未營業，會自動帶你前往休店資訊頁。</p>
    <div class="status" id="statusText">正在連線至松夜鼠堂伺服器...</div>
    <div class="actions">
      <button type="button" id="retryButton">重新確認</button>
      <a href="closedNight.html">查看營業時間</a>
      <a href="indexNight.html">返回松夜鼠堂</a>
    </div>
  </main>
  <script>
    const STATUS_URL = "https://005.squirrel-you-self.com/night-api/store-status";
    const LIVE_MENU_URL = "https://005.squirrel-you-self.com/Night/menuNight.html";
    const CLOSED_URL = "closedNight.html";
    const statusText = document.getElementById("statusText");
    const retryButton = document.getElementById("retryButton");

    async function checkNightStore() {
      statusText.textContent = "正在連線至松夜鼠堂伺服器...";
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 3500);

      try {
        const res = await fetch(`${STATUS_URL}?t=${Date.now()}`, {
          cache: "no-store",
          signal: controller.signal
        });
        clearTimeout(timer);

        if (!res.ok) throw new Error("status request failed");
        const data = await res.json();

        if (data && data.success && data.isOpen) {
          statusText.textContent = "目前開店中，正在前往點餐頁...";
          window.location.replace(LIVE_MENU_URL);
          return;
        }

        statusText.textContent = "目前尚未開放點餐，正在前往休店資訊頁...";
        window.location.replace(CLOSED_URL);
      } catch (err) {
        clearTimeout(timer);
        statusText.textContent = "伺服器目前未開啟，正在前往休店資訊頁...";
        window.location.replace(CLOSED_URL);
      }
    }

    retryButton.addEventListener("click", checkNightStore);
    checkNightStore();
  </script>
</body>
</html>
