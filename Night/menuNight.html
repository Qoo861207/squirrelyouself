<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>松夜鼠堂點餐 Night</title>
  <style>
    :root{--bg:#070407;--panel:rgba(12,7,14,.74);--ink:#fff5e8;--muted:rgba(255,245,232,.72);--line:rgba(240,189,116,.24);--gold:#f0bd74;--rose:#ff638b;--violet:#7c5cff;--ok:#76d98b;--bad:#ff8e8e}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Microsoft JhengHei","Microsoft JhengHei UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 14% 8%,rgba(255,245,232,.22),transparent 24rem),radial-gradient(circle at 84% 4%,rgba(255,99,139,.28),transparent 28rem),linear-gradient(135deg,#050305,#1a101b 54%,#070508);overflow-x:hidden}body:before{content:"";position:fixed;inset:-12vmax;z-index:-1;background:radial-gradient(circle,rgba(255,245,232,.15) 0 1px,transparent 1.8px) 0 0/86px 86px,linear-gradient(112deg,transparent 0 14%,rgba(255,250,226,.18) 24%,rgba(168,207,255,.08) 38%,transparent 54%);opacity:.76;animation:drift 18s ease-in-out infinite alternate}@keyframes drift{to{transform:translate(18px,10px) scale(1.04)}}.page{width:min(1260px,calc(100% - 34px));margin:0 auto;padding:26px 0 72px}.nav{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:26px;padding:13px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(9,6,10,.52);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.14em}.brand-dot{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 34% 28%,#fff4cf,var(--gold) 36%,var(--rose) 70%,#332052);box-shadow:0 0 28px rgba(255,99,139,.42)}.nav-links{display:flex;flex-wrap:wrap;gap:8px}.nav a,.ghost{position:relative;isolation:isolate;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:9px 17px;border:1px solid rgba(240,189,116,.34);border-radius:999px;color:var(--ink);text-decoration:none;font-weight:900;transition:.25s;background:transparent}.nav a:before,.ghost:before{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(90deg,var(--violet),var(--rose),var(--gold));transform:scaleX(0);transform-origin:left;transition:transform .55s cubic-bezier(.18,.78,.22,1)}.nav a:hover,.ghost:hover{transform:translateY(-2px);color:#12090d}.nav a:hover:before,.ghost:hover:before{transform:scaleX(1)}.panel{border:0;border-radius:0;background:transparent;box-shadow:none;backdrop-filter:none}.kicker{margin:0 0 14px;color:var(--gold);font-size:13px;font-weight:900;letter-spacing:.25em;text-transform:uppercase}h1{margin:0;font-size:clamp(42px,7vw,82px);line-height:.95;letter-spacing:-.05em}h2{margin:0 0 18px;font-size:clamp(34px,4.8vw,62px);letter-spacing:-.05em}p{color:var(--muted);line-height:1.85;font-weight:650}.layout{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:28px;align-items:start;margin-top:52px}.panel{padding:0;margin-bottom:20px}.section-head{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:26px}.section-head p{max-width:430px;margin:0}.menu-groups{display:grid;gap:34px}.group-title{display:flex;align-items:end;justify-content:space-between;border-bottom:1px solid rgba(240,189,116,.16);padding-bottom:10px;margin-bottom:14px}.group-title h3{margin:0;font-size:26px}.cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.item{display:grid;grid-template-columns:86px minmax(0,1fr) auto;gap:14px;align-items:center;padding:14px;border:1px solid rgba(240,189,116,.16);border-radius:22px;background:linear-gradient(135deg,rgba(255,245,232,.05),rgba(124,92,255,.035),rgba(255,99,139,.035));box-shadow:inset 0 1px 0 rgba(255,255,255,.04);transition:transform .25s ease,border-color .25s ease,background .25s ease} .item:hover{transform:translateY(-2px);border-color:rgba(240,189,116,.34);background:linear-gradient(135deg,rgba(255,245,232,.07),rgba(124,92,255,.06),rgba(255,99,139,.05))}.item img{width:86px;height:86px;object-fit:cover;border-radius:18px;background:rgba(255,245,232,.08)}.item b{display:block;font-size:18px}.item small{display:block;color:var(--muted);margin-top:5px;line-height:1.55}.price{color:var(--gold);font-weight:950;margin-top:7px}.qty{display:flex;align-items:center;gap:9px}.round{width:38px;height:38px;min-height:38px;border-radius:50%;border:1px solid rgba(240,189,116,.25);background:rgba(255,245,232,.08);color:var(--ink);font-size:20px;font-weight:900;cursor:pointer;transition:transform .18s ease}.round:hover{transform:scale(1.13)}.round:active{transform:scale(1.25)}.count{min-width:30px;text-align:center;font-weight:900;cursor:pointer;border-radius:999px;padding:4px 8px;transition:background .18s ease,transform .18s ease}.count:hover{background:rgba(255,245,232,.08);transform:scale(1.08)}.summary{position:sticky;top:18px;padding:26px;border:1px solid rgba(240,189,116,.22);border-radius:30px;background:rgba(8,5,10,.46);box-shadow:0 22px 70px rgba(0,0,0,.22);backdrop-filter:blur(16px)}.field{display:grid;gap:8px;margin-bottom:14px;color:var(--muted);font-weight:850}input,textarea{width:100%;min-height:48px;border:1px solid rgba(240,189,116,.22);border-radius:16px;background:rgba(255,245,232,.08);color:var(--ink);padding:11px 14px;font:inherit}textarea{resize:vertical}.summary-list{display:grid;gap:8px;margin:16px 0}.line{display:flex;justify-content:space-between;gap:10px;color:var(--muted);border-bottom:1px solid rgba(240,189,116,.12);padding-bottom:8px}.total{font-size:34px;font-weight:950;color:var(--gold)}.submit{width:100%;min-height:54px;border:0;border-radius:999px;background:linear-gradient(90deg,var(--violet),var(--rose),var(--gold));color:#13080d;font-weight:950;font-size:18px;cursor:pointer}.submit:disabled{opacity:.45;cursor:not-allowed}.msg{margin-top:12px;color:var(--muted);font-weight:850}.msg.ok{color:var(--ok)}.msg.bad{color:var(--bad)}@media(max-width:980px){.layout{grid-template-columns:1fr}.section-head{display:block}.summary{position:static}.cards{grid-template-columns:1fr}.nav{align-items:flex-start;border-radius:24px;flex-direction:column}}@media(max-width:620px){.item{grid-template-columns:76px minmax(0,1fr)}.qty{grid-column:1/-1}}
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav"><div class="brand"><span class="brand-dot"></span><span>松夜鼠堂 Night</span></div><div class="nav-links"><a href="indexNight.html">首頁</a><a href="menuNight.html">點餐</a></div></nav>
    <div class="layout">
      <section class="panel"><div class="section-head"><div><p class="kicker">Moonlit Menu</p><h2>夜間菜單</h2></div><p>沿用松你去鼠餐點，換成更適合夜間停留的點餐節奏。</p></div><div id="menuGroups" class="menu-groups"></div></section>
      <aside class="panel summary"><h2>本次點單</h2><label class="field">客人名稱<input id="customer" placeholder="請輸入名稱"></label><label class="field">備註<textarea id="note" rows="3" placeholder="可填寫不吃什麼、想提醒店員的事"></textarea></label><div id="summaryList" class="summary-list"></div><p>總金額</p><div id="total" class="total">0 G</div><button id="submit" class="submit" disabled>送出點餐</button><button id="reset" class="ghost" style="width:100%;margin-top:12px;">清空餐點</button><div id="msg" class="msg"></div></aside>
    </div>
  </main>
  <script>
    let menu=[], cart={};
    const $=id=>document.getElementById(id);
    const money=n=>`${Number(n||0).toLocaleString('zh-TW')} G`;
    function groupMenu(){ return menu.reduce((map,item)=>{ (map[item.category] ||= []).push(item); return map; },{}); }
    function total(){ return menu.reduce((sum,item)=>sum+(cart[item.id]||0)*item.price,0); }
    function selectedItems(){ return menu.filter(item=>(cart[item.id]||0)>0).map(item=>({id:item.id,qty:cart[item.id]})); }
    const MAX_QTY=99;
    function clampQty(value){ const number=Number.parseInt(value,10); if(!Number.isFinite(number)||number<=0) return 0; return Math.min(number,MAX_QTY); }
    function setQtyValue(id,value){ cart[id]=clampQty(value); render(); }
    function setQty(id,delta){ setQtyValue(id,(cart[id]||0)+delta); }
    function render(){ const grouped=groupMenu(); $('menuGroups').innerHTML=Object.entries(grouped).map(([category,items])=>`<section><div class="group-title"><h3>${category}</h3><span>${items.length} 項</span></div><div class="cards">${items.map(item=>`<article class="item"><img src="${item.image}" alt="${item.name}" loading="lazy"><div><b>${item.name}</b><small>${item.desc}</small><div class="price">${money(item.price)}</div></div><div class="qty"><button class="round qty-step" type="button" data-id="${item.id}" data-step="-1" aria-label="減少數量">-</button><span class="count qty-count" data-id="${item.id}" tabindex="0" role="button" title="點擊輸入數量">${cart[item.id]||0}</span><button class="round qty-step" type="button" data-id="${item.id}" data-step="1" aria-label="增加數量">+</button></div></article>`).join('')}</div></section>`).join(''); const lines=menu.filter(item=>cart[item.id]>0); $('summaryList').innerHTML=lines.length?lines.map(item=>`<div class="line"><span>${item.name} x${cart[item.id]}</span><b>${money(item.price*cart[item.id])}</b></div>`).join(''):'<p>目前還沒有選餐。</p>'; $('total').textContent=money(total()); $('submit').disabled=total()<=0 || !$('customer').value.trim(); }
    async function loadMenu(){ const res=await fetch('/night-api/menu'); const data=await res.json(); menu=data.menu||[]; cart=Object.fromEntries(menu.map(item=>[item.id,0])); render(); }
    let qtyDelayTimer=null, qtyRepeatTimer=null, qtyLongPressed=false;
    function stopQtyHold(){ if(qtyDelayTimer) clearTimeout(qtyDelayTimer); if(qtyRepeatTimer) clearInterval(qtyRepeatTimer); qtyDelayTimer=null; qtyRepeatTimer=null; }
    function startQtyHold(button){ const id=button.dataset.id; const step=Number(button.dataset.step||0); stopQtyHold(); qtyLongPressed=false; qtyDelayTimer=setTimeout(()=>{ qtyLongPressed=true; setQty(id,step); qtyRepeatTimer=setInterval(()=>setQty(id,step),85); },330); }
    function askQty(id){ const item=menu.find(entry=>entry.id===id); const current=cart[id]||0; const input=window.prompt(`輸入「${item?item.name:'餐點'}」數量（1-99，留空或 0 代表取消）`, current||1); if(input!==null) setQtyValue(id,input); }
    document.addEventListener('click',event=>{ const button=event.target.closest('.qty-step'); if(button){ if(qtyLongPressed){ qtyLongPressed=false; return; } setQty(button.dataset.id,Number(button.dataset.step||0)); return; } const count=event.target.closest('.qty-count'); if(count) askQty(count.dataset.id); });
    document.addEventListener('mousedown',event=>{ const button=event.target.closest('.qty-step'); if(button) startQtyHold(button); });
    document.addEventListener('touchstart',event=>{ const button=event.target.closest('.qty-step'); if(button) startQtyHold(button); },{passive:true});
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(eventName=>document.addEventListener(eventName,stopQtyHold));
    document.addEventListener('keydown',event=>{ const count=event.target.closest('.qty-count'); if(!count) return; if(event.key==='Enter'||event.key===' '){ event.preventDefault(); askQty(count.dataset.id); } });
    $('customer').addEventListener('input',render);
    $('reset').addEventListener('click',()=>{Object.keys(cart).forEach(key=>cart[key]=0);render();});
    $('submit').addEventListener('click',async()=>{ const res=await fetch('/night-api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customer:$('customer').value,note:$('note').value,items:selectedItems()})}); const data=await res.json(); $('msg').className='msg '+(data.success?'ok':'bad'); $('msg').textContent=data.success?'點餐已送出，請稍候店員確認。':(data.message||'送出失敗'); if(data.success){Object.keys(cart).forEach(key=>cart[key]=0);$('note').value='';render();} });
    loadMenu();
  </script>
</body>
</html>
