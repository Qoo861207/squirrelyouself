<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>松夜鼠堂抽獎 Night</title>
  <link rel="preload" href="/Gamble/Bside-lite.jpg" as="image">
  <link rel="preload" href="/Gamble/card-back-a.svg" as="image">
  <style>
    :root {
      --bg: #120f0d;
      --panel: rgba(28, 22, 18, 0.92);
      --panel-2: rgba(41, 31, 24, 0.92);
      --line: rgba(221, 185, 134, 0.18);
      --text: #f9f1e7;
      --muted: #c8b39f;
      --accent: #d18b55;
      --accent-2: #f2bf7b;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      --common: linear-gradient(135deg, #7f7067, #a5978a);
      --uncommon: linear-gradient(135deg, #3f7d56, #62b07a);
      --rare: linear-gradient(135deg, #355f9e, #5f97df);
      --epic: linear-gradient(135deg, #7442b4, #ab77f0);
      --legendary: linear-gradient(135deg, #b86d24, #ffd17d);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(228, 168, 92, 0.16), transparent 28%),
        radial-gradient(circle at 18% 24%, rgba(255, 220, 166, 0.08), transparent 24%),
        linear-gradient(180deg, #1a1411 0%, #0d0907 100%);
    }

    .page {
      width: min(1280px, calc(100% - 40px));
      margin: 28px auto 40px;
      display: grid;
      gap: 22px;
    }

    .hero, .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px 32px;
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 22px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent-2);
      font-size: 0.9rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 18px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.9;
    }

    .hero-side {
      display: grid;
      gap: 14px;
    }

    .stat-card {
      padding: 18px 20px;
      border-radius: 22px;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 800;
    }

    .board-hero {
      grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.8fr);
      align-items: stretch;
    }

    .board-stage {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(247, 214, 142, 0.36);
      background: rgba(0, 0, 0, 0.42);
      box-shadow: inset 0 0 36px rgba(255, 202, 120, 0.08), 0 18px 45px rgba(0, 0, 0, 0.36);
    }

    .board-map {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: contain;
      background: rgba(255, 247, 224, 0.04);
    }

    .board-token {
      position: absolute;
      left: var(--token-x, 10.5%);
      top: var(--token-y, 13%);
      width: clamp(72px, 8.4vw, 124px);
      transform: translate(-50%, -34%);
      transform-origin: 50% 82%;
      z-index: 4;
      filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.55)) drop-shadow(0 0 12px rgba(255, 222, 150, 0.48));
      transition: left 0.42s cubic-bezier(.2,.8,.22,1), top 0.42s cubic-bezier(.2,.8,.22,1);
      pointer-events: none;
    }

    .board-token.is-moving {
      animation: boardTokenHop 0.42s ease-in-out infinite;
    }

    .board-side {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .board-copy {
      padding: 6px 4px 4px;
    }

    .board-copy h1 {
      margin-bottom: 12px;
    }

    .board-status {
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      line-height: 1.7;
    }

    .board-action {
      width: 100%;
      justify-content: center;
    }

    .board-prize-pop {
      position: fixed;
      inset: 0;
      z-index: 95;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 50% 40%, rgba(255, 217, 146, 0.2), rgba(0, 0, 0, 0.78) 62%);
      backdrop-filter: blur(8px);
    }

    .board-prize-pop[hidden] {
      display: none;
    }

    .board-prize-card {
      width: min(420px, 86vw);
      padding: 18px;
      border-radius: 28px;
      border: 1px solid rgba(247, 214, 142, 0.42);
      background: linear-gradient(160deg, rgba(36, 24, 16, 0.96), rgba(12, 8, 6, 0.96));
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.65), 0 0 32px rgba(255, 218, 135, 0.2);
      animation: boardPrizeIn 0.46s cubic-bezier(.2,.85,.2,1) both;
      text-align: center;
    }

    .board-prize-card img {
      display: block;
      width: 100%;
      max-height: 58vh;
      object-fit: contain;
      border-radius: 18px;
      margin-bottom: 14px;
    }

    .board-prize-card h3 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 4vw, 2.1rem);
    }

    .board-prize-card p {
      margin: 0;
      color: var(--muted);
    }

    @keyframes boardTokenHop {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      48% { transform: translate(-50%, -66%) scale(1.05); }
    }

    @keyframes boardPrizeIn {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.65fr 0.85fr;
      gap: 22px;
    }

    .case-panel {
      padding: 22px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin: 0;
    }

    .panel-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .case-selector {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .case-chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      font-weight: 700;
    }

    .case-chip:hover { transform: scale(1.05); }
    .case-chip.active {
      background: linear-gradient(135deg, rgba(209, 139, 85, 0.24), rgba(242, 191, 123, 0.1));
      border-color: rgba(242, 191, 123, 0.52);
    }

    .reel-wrap {
      position: relative;
      border-radius: 26px;
      padding: 22px 18px 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent 30%),
        #110d0b;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .reel-highlight {
      position: absolute;
      top: 16px;
      bottom: 16px;
      left: 50%;
      width: 182px;
      transform: translateX(-50%);
      border-radius: 20px;
      border: 2px solid rgba(255, 227, 172, 0.9);
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.32), 0 0 26px rgba(255, 188, 101, 0.32);
      pointer-events: none;
      z-index: 3;
    }

    .reel-track {
      display: flex;
      gap: 14px;
      will-change: transform;
      padding: 2px 0;
    }

    .reel-item {
      width: 168px;
      min-width: 168px;
      height: 230px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      background: #1a1411;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .reel-art {
      height: 122px;
      display: grid;
      place-items: center;
      font-size: 2.5rem;
      font-weight: 900;
      text-shadow: 0 4px 18px rgba(0,0,0,0.45);
      padding: 12px;
    }

    .reel-item.full-prize-face {
      border-radius: 12px;
    }

    .reel-art.with-prize-image {
      color: transparent;
      height: 100%;
      background-color: rgba(0,0,0,0.22);
      background-position: center;
      background-size: auto 104%;
      background-repeat: no-repeat;
    }

    .reel-item.full-prize-face .reel-body {
      display: none;
    }

    .reel-body {
      padding: 14px 14px 16px;
      background: rgba(17,13,11,0.95);
      height: calc(100% - 122px);
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .item-name {
      font-size: 1.02rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .item-type {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .rarity-tag {
      margin-top: auto;
      justify-self: start;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-top: 18px;
    }

    .ten-draw-overlay[hidden] {
      display: none;
    }

    .ten-draw-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 18% 20%, rgba(244, 174, 95, 0.2), transparent 34%),
        radial-gradient(circle at 86% 18%, rgba(94, 66, 255, 0.2), transparent 36%),
        rgba(5, 3, 5, 0.9);
      backdrop-filter: blur(14px);
    }

    .ten-draw-panel {
      width: min(1320px, 100%);
      border: 1px solid rgba(245, 196, 124, 0.42);
      border-radius: 28px;
      padding: 28px;
      background: linear-gradient(135deg, rgba(34, 22, 18, 0.96), rgba(12, 6, 10, 0.98));
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.58);
    }

    .ten-draw-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .ten-draw-head h2 {
      margin: 4px 0 8px;
      font-size: clamp(30px, 4vw, 58px);
      line-height: 1;
    }

    .ten-draw-status {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
    }

    .ten-draw-grid {
      display: grid;
      grid-template-columns: repeat(10, minmax(72px, 1fr));
      gap: 12px;
      min-height: 330px;
    }

    .ten-draw-card {
      position: relative;
      min-height: 330px;
      overflow: hidden;
      border: 1px solid rgba(245, 196, 124, 0.2);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.42);
      opacity: 0.38;
      transform: translateY(18px) scale(0.96);
      transition:
        opacity 520ms ease,
        transform 620ms cubic-bezier(0.2, 0.85, 0.18, 1.18),
        border-color 520ms ease,
        box-shadow 520ms ease;
    }

    .ten-draw-card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
      border-color: rgba(255, 222, 151, 0.7);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.38);
    }

    .ten-draw-back,
    .ten-draw-front {
      position: absolute;
      inset: 0;
      transition: opacity 420ms ease;
    }

    .ten-draw-back {
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.22)),
        url('/Gamble/Bside-lite.jpg') center / cover no-repeat;
    }

    .ten-draw-front {
      display: grid;
      grid-template-rows: 1fr auto;
      opacity: 0;
      background: rgba(9, 5, 4, 0.88);
    }

    .ten-draw-card.revealed .ten-draw-back {
      opacity: 0;
    }

    .ten-draw-card.revealed .ten-draw-front {
      opacity: 1;
    }

    .ten-draw-image {
      min-height: 250px;
      background-position: center;
      background-repeat: no-repeat;
      background-size: auto 104%;
    }

    .ten-draw-meta {
      padding: 12px;
      background: linear-gradient(180deg, rgba(18, 9, 6, 0.76), rgba(7, 3, 2, 0.94));
    }

    .ten-draw-meta strong {
      display: block;
      color: var(--cream);
      font-size: 18px;
      line-height: 1.25;
    }

    .ten-draw-meta span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .ten-draw-card.common.revealed {
      box-shadow: 0 18px 45px rgba(255, 255, 255, 0.12);
    }

    .ten-draw-card.uncommon.revealed {
      box-shadow: 0 18px 50px rgba(49, 255, 141, 0.22);
    }

    .ten-draw-card.rare.revealed {
      box-shadow: 0 18px 52px rgba(76, 143, 255, 0.24);
    }

    .ten-draw-card.epic.revealed {
      box-shadow: 0 18px 55px rgba(183, 94, 255, 0.26);
    }

    .ten-draw-card.legendary.revealed {
      box-shadow:
        0 0 0 1px rgba(255, 221, 126, 0.65),
        0 20px 60px rgba(255, 195, 61, 0.34);
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 15px 24px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 800;
      transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    .button:hover { transform: scale(1.06); }
    .button:active { transform: scale(1.12); }
    .button.primary {
      background: linear-gradient(135deg, #d0834a, #f3bb78);
      color: #1c110d;
      box-shadow: 0 12px 24px rgba(193, 121, 57, 0.28);
    }

    .button.secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .side-panel {
      padding: 22px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .drop-card {
      border-radius: 24px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .drop-art {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.08));
    }

    .drop-body {
      padding: 18px 20px 20px;
      display: grid;
      gap: 8px;
    }

    .drop-name { font-size: 1.3rem; font-weight: 900; }
    .drop-desc { color: var(--muted); line-height: 1.8; }

    .pool {
      display: grid;
      gap: 10px;
      max-height: 320px;
      overflow: auto;
      padding-right: 6px;
    }

    .pool-item {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .pool-thumb {
      width: 48px;
      height: 68px;
      border-radius: 9px;
      background-color: rgba(0,0,0,0.22);
      background-position: center;
      background-size: auto 104%;
      background-repeat: no-repeat;
      box-shadow: inset 0 0 0 1px rgba(255, 224, 174, 0.18);
    }

    .pool-left { display: grid; gap: 4px; }
    .pool-name { font-weight: 800; }
    .pool-type { color: var(--muted); font-size: 0.88rem; }
    .pool-rate { font-weight: 900; color: var(--accent-2); }

    .drop-art.with-prize-image {
      color: transparent;
      background-color: rgba(0,0,0,0.22);
      background-position: center;
      background-size: auto 104%;
      background-repeat: no-repeat;
    }

    .history-panel {
      padding: 22px;
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .history-main { display: grid; gap: 4px; }
    .history-name { font-weight: 900; }
    .history-meta { color: var(--muted); font-size: 0.88rem; }

    .ten-draw-overlay[hidden] { display: none; }
    .ten-draw-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: grid;
      place-items: start center;
      padding: clamp(10px, 1.5vw, 18px);
      overflow: auto;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 217, 153, 0.16), transparent 24rem),
        radial-gradient(circle at 82% 28%, rgba(154, 104, 255, 0.18), transparent 28rem),
        rgba(5, 3, 4, 0.84);
      backdrop-filter: blur(14px);
    }

    .ten-draw-panel {
      width: min(1380px, 100%);
      max-height: calc(100vh - 20px);
      border: 1px solid rgba(255, 216, 158, 0.28);
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(21, 14, 12, 0.96), rgba(9, 6, 8, 0.96));
      box-shadow: 0 36px 120px rgba(0, 0, 0, 0.54);
      padding: clamp(14px, 1.8vw, 24px);
    }

    .ten-draw-head {
      display: none;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 10px;
    }

    .ten-draw-head .eyebrow {
      margin-bottom: 4px;
    }

    .ten-draw-head h2 {
      margin: 0 0 4px;
      font-size: clamp(2.15rem, 5vw, 4.8rem);
      line-height: 0.94;
    }

    .ten-draw-status {
      margin: 0;
      color: var(--muted);
      font-weight: 850;
      letter-spacing: 0.03em;
    }

    .ten-draw-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 4.4rem);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .ten-draw-sub {
      margin: 10px 0 0;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .ten-draw-close {
      border: 1px solid rgba(255, 216, 158, 0.32);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 10px 16px;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    .ten-draw-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: clamp(10px, 1.1vw, 16px);
      align-items: stretch;
      max-width: 900px;
      margin: 0 auto;
    }

    .ten-card {
      position: relative;
      aspect-ratio: 0.68;
      min-height: 0;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      opacity: 0;
      transform: translateY(18px) scale(0.94);
      animation: tenCardEnter 0.56s cubic-bezier(.18,.82,.22,1) forwards;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .ten-card::before,
    .ten-card::after {
      content: "";
      position: absolute;
      inset: 0;
      transition: opacity 0.5s ease, transform 0.7s cubic-bezier(.2,.82,.24,1);
    }

    .ten-card::before {
      z-index: 2;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.04), rgba(0,0,0,0.26)),
        url('/Gamble/Bside-lite.jpg') center / cover no-repeat;
      transform: rotateY(0deg);
      transform-origin: center;
    }

    .ten-card::after {
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.72), transparent);
      transform: translateX(-130%) skewX(-12deg);
    }

    .ten-card.revealed::before {
      opacity: 0;
      transform: rotateY(88deg) scaleX(0.12);
    }

    .ten-card.revealed::after {
      opacity: 1;
      animation: tenCardShine 0.92s ease forwards;
    }

    .ten-card-face {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      background-color: rgba(0,0,0,0.34);
      background-position: center;
      background-size: auto 104%;
      background-repeat: no-repeat;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 0.5s ease, transform 0.7s cubic-bezier(.2,.82,.24,1);
    }

    .ten-card.revealed .ten-card-face {
      opacity: 1;
      transform: scale(1);
    }

    .ten-card.revealing {
      opacity: 1;
      transform-style: preserve-3d;
      animation: tenCardLocalRevealSpin 1.9s linear forwards;
      border-color: rgba(255, 216, 158, 0.62);

    const BOARD_LAST_POSITION = 23;

    function normalizeBoardPosition(position) {
      return ((Number(position || 1) - 1 + BOARD_LAST_POSITION) % BOARD_LAST_POSITION) + 1;
    }

    function getNextBoardPosition(current, direction) {
      const normalizedCurrent = normalizeBoardPosition(current);
      const normalizedDirection = direction >= 0 ? 1 : -1;

      return normalizeBoardPosition(normalizedCurrent + normalizedDirection);
    }

    function normalizeBoardStorageText(value) {
      return String(value || '').trim().toUpperCase().replace(/\s+/g, '_');
    }

    function getBoardStorageKey() {
      const customer = normalizeBoardStorageText(raffleContext.customer);
      if (customer) return `squirrely-night-board-position:customer:${customer}`;
      const orderId = normalizeBoardStorageText(raffleContext.orderId);
      const token = normalizeBoardStorageText(raffleContext.token);
      return orderId && token ? `squirrely-night-board-position:order:${orderId}:${token}` : '';
    }

    function readStoredBoardPosition(key = getBoardStorageKey()) {
      if (!key) return null;
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        return normalizeBoardPosition(Number(raw));
      }
      catch (err) {
        return null;
      }
    }

    function saveBoardPosition() {
      const key = getBoardStorageKey();
      if (!key) return;
      try {
        state.boardStorageKey = key;
        localStorage.setItem(key, String(state.boardPosition));
      }
      catch (err) {
        console.warn('night board position save failed', err);
      }
    }

    function clearBoardPositionStorage() {
      const keys = new Set([state.boardStorageKey, getBoardStorageKey()].filter(Boolean));
      keys.forEach(key => {
        try { localStorage.removeItem(key); }
        catch (err) { console.warn('night board position clear failed', err); }
      });
      state.boardStorageKey = '';
    }

    function syncBoardPositionStorage({ preferStored = false } = {}) {
      const key = getBoardStorageKey();
      if (!key) return;
      if (state.requestedBoardPosition) {
        state.boardStorageKey = key;
        setBoardPosition(state.requestedBoardPosition);
        state.requestedBoardPosition = 0;
        try {
          pageParams.delete('board');
          const query = pageParams.toString();
          window.history.replaceState({}, '', `${window.location.pathname}${query ? `?${query}` : ''}`);
        }
        catch (err) {
          console.warn('night board test position url cleanup failed', err);
        }
        return;
      }
      if (key === state.boardStorageKey) return;
      const stored = readStoredBoardPosition(key);
      state.boardStorageKey = key;
      if (preferStored && stored !== null) {
        setBoardPosition(stored);
      }
      else {
        saveBoardPosition();
      }
    }

    function setBoardPosition(position) {
      state.boardPosition = normalizeBoardPosition(position);
      const point = BOARD_POSITIONS[state.boardPosition] || BOARD_POSITIONS[1];
      if (boardTokenEl) {
        boardTokenEl.style.setProperty('--token-x', `${point.x}%`);
        boardTokenEl.style.setProperty('--token-y', `${point.y}%`);
      }
      const tile = BOARD_TILES[state.boardPosition] || BOARD_TILES[1];
      if (boardStatusEl) {
        boardStatusEl.textContent = `目前停在第 ${String(state.boardPosition).padStart(2, '0')} 格：${tile.title}。`;
      }
      saveBoardPosition();
    }

    function showBoardPrize(tile) {

      boardPrizeImage.src = tile.image;

      if (note) note.textContent = `${tile.note || '獲得地圖獎項。'} 點擊螢幕關閉提示。`;

    }

    function focusBoardForMovement() {
      const boardStage = document.getElementById('boardStage');
      boardStage?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function getBoardTileMoveSteps(tile) {
      if (!tile?.title) return 0;
      const title = String(tile.title || '');
      if (title.includes('\u524d\u9032\u4e09\u683c')) return 3;
      if (title.includes('\u524d\u9032\u5169\u683c')) return 2;
      if (title.includes('\u524d\u9032\u4e00\u683c')) return 1;
      if (title.includes('\u5f8c\u9000\u5169\u683c')) return -2;
      if (title.includes('\u5f8c\u9000\u4e00\u683c')) return -1;
      return Number(tile.boardMoveSteps || 0);
    }

    function getBoardTileRarity(tile) {
      if (!tile?.title) return 'common';
      const title = String(tile.title || '');
      if (title.includes('100\u842c') || title.includes('START')) return 'legendary';
      if (title.includes('50\u842c') || title.includes('30\u842c')) return 'epic';
      if (title.includes('10\u842c') || title.includes('\u6298\u50f9')) return 'rare';
      if (title.includes('\u524d\u9032') || title.includes('\u5f8c\u9000') || title.includes('\u518d\u62bd')) return 'uncommon';
      return 'common';
    }

    function makeBoardTileResult(tile) {
      if (!tile) return null;
      const moveSteps = getBoardTileMoveSteps(tile);
      const isStart = state.boardPosition === 1 || tile.title === 'START';
      const name = isStart ? '100\u842cG\u5927\u734e' : tile.title;
      return {
        name,
        type: '\u5927\u5bcc\u7fc1\u5730\u5716',
        rarity: isStart ? 'legendary' : getBoardTileRarity(tile),
        chance: 0,
        art: '\u683c',
        image: isStart ? '/Gamble/prize-assets/1000000Gil.jpg' : (tile.image || '/Gamble/card-back-a.svg'),
        desc: tile.note || '\u5927\u5bcc\u7fc1\u5730\u5716\u683c\u734e\u9805\u3002',
        boardMoveSteps: moveSteps,
        boardRest: String(tile.title || '').includes('\u539f\u5730\u4f11\u606f'),
        boardTile: state.boardPosition
      };
    }

    async function resolveBoardTile(tile, chainDepth = 0) {
      if (!tile) return;
      const result = makeBoardTileResult(tile);
      showBoardPrize({
        title: result.name,
        image: result.image,
        note: result.desc
      });
      reportGambleResult(result, state.spins, { remaining: state.raffle?.remaining || 0 });

      if (result.boardMoveSteps && chainDepth < 6) {
        await sleep(1250);
        if (boardPrizePop) boardPrizePop.hidden = true;
        await moveBoardToken(result.boardMoveSteps, chainDepth + 1);
      }
    }

    async function moveBoardToken(steps, chainDepth = 0) {
      if (state.boardMoving || !boardTokenEl) return;
      const stepCount = Number(steps || 0);
      if (!stepCount) return;
      state.boardMoving = true;
      boardMoveBtn && (boardMoveBtn.disabled = true);
      boardTokenEl.classList.add('is-moving');
      focusBoardForMovement();
      await sleep(650);

      const direction = stepCount >= 0 ? 1 : -1;
      for (let i = 0; i < Math.abs(stepCount); i += 1) {
        setBoardPosition(getNextBoardPosition(state.boardPosition, direction));
        await sleep(430);
      }

      boardTokenEl.classList.remove('is-moving');
      state.boardMoving = false;
      boardMoveBtn && (boardMoveBtn.disabled = false);
      await resolveBoardTile(BOARD_TILES[state.boardPosition], chainDepth);
    }

    async function refreshRaffleEligibility() {
      if (!raffleContext.orderId || !raffleContext.token) {
        setOpenButtonsDisabled(true);
        setRaffleHint('請從 Night 後台訂單的專屬抽獎網址進入。');
        return null;
      }
      try {
        const res = await fetch(`/night-api/raffle/${encodeURIComponent(raffleContext.orderId)}?token=${encodeURIComponent(raffleContext.token)}&_=${Date.now()}`, { cache: 'no-store' });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || '抽獎資格讀取失敗');
        raffleContext.raffle = data.raffle || data?.order?.raffle || null;
        raffleContext.customer = String(data?.order?.customer || '').trim();
        syncBoardPositionStorage({ preferStored: true });
        const remaining = Number(raffleContext.raffle?.remaining || 0);
        setOpenButtonsDisabled(remaining <= 0);
        setRaffleHint(remaining > 0 ? describeRaffle(raffleContext.raffle) : `${describeRaffle(raffleContext.raffle)}｜目前沒有剩餘抽獎資格`);
        return raffleContext.raffle;
      }
      catch (err) {
        console.warn('night raffle eligibility load failed', err);
        setOpenButtonsDisabled(true);
        setRaffleHint('Night 抽獎資格讀取失敗，請確認 Ver005 伺服器正在運作，或請店員重新複製連結。');
        return null;
      }
    }

    async function claimRaffleEligibility() {
      if (!raffleContext.orderId || !raffleContext.token) {
        alert('請從 Night 後台訂單開啟抽獎頁');
        return null;
      }
      const res = await fetch(`/night-api/raffle/${encodeURIComponent(raffleContext.orderId)}/claim`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: raffleContext.token })
      });
      const data = await res.json();
      if (!data.success) {
        raffleContext.raffle = data.raffle || raffleContext.raffle;
        setRaffleHint(data.message || '目前沒有剩餘抽獎資格');
        setOpenButtonsDisabled(true);
        alert(data.message || '目前沒有剩餘抽獎資格');
        return null;
      }
      raffleContext.raffle = data.raffle || null;
      raffleContext.customer = String(data?.order?.customer || raffleContext.customer || '').trim();
      setRaffleHint(describeRaffle(raffleContext.raffle));
      return raffleContext.raffle;
    }

        <button class="case-chip ${box.id === state.currentCase.id ? 'active' : ''}" data-case="${box.id}">${box.name}</button>
      `).join('');
    }

    function updatePool() {
      poolList.innerHTML = state.currentCase.items.map(item => `
        <div class="pool-item">
          <div class="pool-thumb" style="background-image: url('${item.image || '/Gamble/card-back-a.svg'}')" aria-hidden="true"></div>
          <div class="pool-left">
            <div class="pool-name">${item.name}</div>
            <div class="pool-type">${item.type}｜${rarityText[item.rarity]}</div>

        </div>

    function updateHeader() {
      customerSeatLabelEl.textContent = raffleContext.orderId ? ('#' + raffleContext.orderId) : '未指定';
      customerNameLabelEl.textContent = raffleContext.customer || '未指定';
      spinCountEl.textContent = state.spins;
    }

    function updateHistory() {
      if (!state.history.length) {
        historyList.innerHTML = '<div class="history-item"><div class="history-main"><div class="history-name">目前還沒有抽獎紀錄</div><div class="history-meta">按下開箱後，這裡會列出最近抽到的結果。</div></div></div>';

    function getRarityLabel(rarity) {
      switch (rarity) {
        case "legendary": return "傳說";
        case "epic": return "史詩";
        case "rare": return "稀有";
        case "uncommon": return "少見";
        default: return "一般";
      }
    }

    function showRevealCard(item) {
      revealOverlayEl = revealOverlayEl || document.getElementById("revealOverlay");
      revealCardEl = revealCardEl || document.getElementById("revealCard");
      revealArtEl = revealArtEl || document.getElementById("revealArt");
      revealNameEl = revealNameEl || document.getElementById("revealName");
      revealRarityEl = revealRarityEl || document.getElementById("revealRarity");
      revealFrontArtEl = revealFrontArtEl || document.getElementById("revealFrontArt");
      revealFrontLabelEl = revealFrontLabelEl || document.getElementById("revealFrontLabel");
      revealFrontSubEl = revealFrontSubEl || document.getElementById("revealFrontSub");
      if (!revealOverlayEl || !revealCardEl || !revealArtEl || !revealNameEl || !revealRarityEl || !revealFrontArtEl || !revealFrontLabelEl || !revealFrontSubEl) return;
      const revealFrontFace = revealCardEl.querySelector('.reveal-card-front');
      const prizeImage = item.image || '/Gamble/card-back-a.svg';
      if (revealFrontFace) {
        revealFrontFace.style.setProperty('--prize-front-image', 'url("' + prizeImage + '")');
        revealFrontFace.classList.add('use-prize-image');
      }
      if (!revealOverlayEl.dataset.boundClose) {
        const closeReveal = () => {
          revealOverlayEl.classList.remove("active");
          clearPrizeFlashClasses();
          revealOverlayEl.dispatchEvent(new CustomEvent("reveal-card-closed"));
        };
        revealOverlayEl.addEventListener("click", closeReveal);
        revealCardEl.addEventListener("click", closeReveal);
        revealOverlayEl.dataset.boundClose = "1";
      }
      revealFrontArtEl.textContent = "";
      revealFrontLabelEl.textContent = "";
      revealFrontSubEl.textContent = "";
      revealCardEl.classList.add("show-b-side");
      revealArtEl.className = `drop-art with-prize-image bg-${item.rarity}`;
      revealArtEl.style.backgroundImage = `url('${prizeImage}')`;
      revealArtEl.textContent = "";
      revealNameEl.textContent = item.name;
      revealRarityEl.textContent = getRarityLabel(item.rarity);
      revealRarityEl.className = `reveal-rarity ${item.rarity}`;
      revealOverlayEl.classList.remove("active");
      revealOverlayEl.classList.remove("show-hint");
      revealCardEl.style.animation = "none";
      revealCardEl.onanimationend = null;
      void revealOverlayEl.offsetWidth;
      revealOverlayEl.classList.add("active");
      window.clearTimeout(showRevealCard.sideToBackTimer);
      window.clearTimeout(showRevealCard.sideToFrontTimer);
      showRevealCard.sideToBackTimer = window.setTimeout(() => {
        revealFrontArtEl.textContent = "";
        revealFrontLabelEl.textContent = "";
        revealFrontSubEl.textContent = "";
        revealCardEl.classList.add("show-b-side");
      }, 0);
      showRevealCard.sideToFrontTimer = window.setTimeout(() => {
        revealFrontArtEl.textContent = "";
        revealFrontLabelEl.textContent = "";
        revealFrontSubEl.textContent = "";
        revealCardEl.classList.remove("show-b-side");
      }, 1540);
      revealCardEl.style.animation = "revealCardSpin 1.9s linear forwards";
      revealCardEl.onanimationend = () => {
        revealFrontArtEl.textContent = "";
        revealFrontLabelEl.textContent = "";
        revealFrontSubEl.textContent = "";
        revealCardEl.classList.remove("show-b-side");
        revealOverlayEl.classList.add("show-hint");
        revealOverlayEl.dispatchEvent(new CustomEvent("reveal-card-finished", { detail: item }));
        revealCardEl.onanimationend = null;
      };
      window.clearTimeout(showRevealCard.timer);
    }


    function isBoardActionItem(item) {
      if (!item) return false;
      return Boolean(
        Number(item.boardMoveSteps || 0) ||
        item.boardRest ||
        String(item.name || '').includes('\u539f\u5730\u4f11\u606f') ||
        String(item.type || '').includes('\u5927\u5bcc\u7fc1')
      );
    }

    async function runBoardActionItem(item, options = {}) {
      if (!item) return;
      const moveSteps = Number(item.boardMoveSteps || 0);
      if (moveSteps) {
        if (options.showBeforeMove !== false) {
          const absSteps = Math.abs(moveSteps);
          showBoardPrize({
            title: item.name || (moveSteps > 0 ? `\u524d\u9032${absSteps}\u683c` : `\u5f8c\u9000${absSteps}\u683c`),
            image: item.image,
            note: item.desc || (moveSteps > 0 ? `\u79fb\u52d5\u9078\u9805\uff1a\u5f80\u524d ${absSteps} \u683c\u3002` : `\u79fb\u52d5\u9078\u9805\uff1a\u5f80\u5f8c ${absSteps} \u683c\u3002`)
          });
          await sleep(options.moveNoticeDelay || 1150);
          if (boardPrizePop) boardPrizePop.hidden = true;
        }
        await moveBoardToken(moveSteps);
        return;
      }
      if (options.showNonMove || item.boardRest || String(item.name || '').includes('\u539f\u5730\u4f11\u606f')) {
        showBoardPrize({
          title: item.name || '\u539f\u5730\u4f11\u606f',
          image: item.image,
          note: item.desc || '\u9019\u6b21\u5927\u5bcc\u7fc1\u539f\u5730\u4f11\u606f\u3002'
        });
        if (options.autoHide) {
          await sleep(options.restDelay || 900);
          if (boardPrizePop) boardPrizePop.hidden = true;
        }
      }
    }

    async function runTenDrawBoardQueue() {
      const boardItems = state.tenDrawResults.filter(isBoardActionItem);
      if (!boardItems.length) return;
      for (const item of boardItems) {
        await runBoardActionItem(item, { autoHide: true, restDelay: 850 });
        await sleep(260);
      }
    }

    function runBoardActionAfterReveal(item) {
      if (!isBoardActionItem(item)) return;

      let hasRunBoardAction = false;
      const runAction = () => {
        if (hasRunBoardAction) return;
        hasRunBoardAction = true;
        window.setTimeout(() => {
          runBoardActionItem(item, { showNonMove: true }).catch((error) => console.warn('board action failed', error));
        }, 120);
      };

      revealOverlayEl = revealOverlayEl || document.getElementById("revealOverlay");
      if (revealOverlayEl?.classList.contains("active")) {
        revealOverlayEl.addEventListener("reveal-card-closed", runAction, { once: true });
        window.setTimeout(() => {
          if (hasRunBoardAction || !revealOverlayEl?.classList.contains("active")) return;
          revealOverlayEl.classList.remove("active");
          revealOverlayEl.classList.remove("show-hint");
          clearPrizeFlashClasses();
          runAction();
        }, 7200);
        return;
      }

      runAction();
    }

    function playRevealCardAnimation(item, holdAfterFinish = 360) {
      return new Promise(resolve => {
        revealOverlayEl = revealOverlayEl || document.getElementById("revealOverlay");
        if (!revealOverlayEl) {
          resolve();
          return;
        }
        const finish = () => {
          window.setTimeout(() => {
            revealOverlayEl.classList.remove("active");
            revealOverlayEl.classList.remove("show-hint");
            resolve();
          }, holdAfterFinish);
        };
        revealOverlayEl.addEventListener("reveal-card-finished", finish, { once: true });
        showRevealCard(item);
      });
    }


    function reportGambleResult(item, spinIndex, raffle) {
      return fetch('/night-api/gamble-result', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: item.name,
          type: item.type,
          rarity: item.rarity,
          chance: item.chance,
          caseName: state.currentCase.name,
          seat: `Night#${raffleContext.orderId}`,
          orderId: raffleContext.orderId,
          token: raffleContext.token,
          customer: raffleContext.customer,
          raffleRemaining: Number(raffle?.remaining || 0),
          spinIndex
        })
      })
        .then(async res => {
          if (!res.ok) throw new Error(await res.text());
          return res.json();
        })
        .catch(err => console.warn('gamble result report failed', err));
    }
    function setLatestDrop(item) {
      if (!dropArtEl || !dropNameEl || !dropDescEl || !dropRarityEl) return;
      dropArtEl.className = 'drop-art with-prize-image ' + rarityBgClass(item.rarity);
      dropArtEl.textContent = '';
      dropArtEl.style.backgroundImage = `url('${item.image || '/Gamble/card-back-a.svg'}')`;
      dropNameEl.textContent = item.name;
      dropDescEl.textContent = item.desc;
      dropRarityEl.className = 'rarity-tag ' + rarityBadgeClass(item.rarity);
      dropRarityEl.textContent = rarityText[item.rarity];
    }

    function weightedPick(box) {
      const roll = Math.random() * 100;
      let sum = 0;
      for (const item of box.items) {
        sum += item.chance;
        if (roll <= sum) return item;
      }
      return box.items[box.items.length - 1];
    }

    function pickWithPity() {
      if (FORCE_DEMO_SEQUENCE || state.forceDemoNextSpin) {
        const item = state.currentCase.items[state.demoIndex % state.currentCase.items.length];
        state.demoIndex += 1;
        state.pity = 0;
        state.forceDemoNextSpin = false;
        return item;
      }

      const item = weightedPick(state.currentCase);
      state.pity += 1;
      return item;
    }
    function renderIdleStrip() {
      const pool = state.currentCase.items;
      const featuredIndex = Math.max(0, pool.findIndex(item => item.rarity === 'legendary'));
      const idleStrip = pool.concat(pool, pool);
      const targetIndex = pool.length + featuredIndex;

      reelTrack.getAnimations().forEach(animation => animation.cancel());
      reelTrack.innerHTML = idleStrip.map(makeCard).join('');
      reelTrack.style.transition = 'none';
      reelTrack.style.transform = 'translateX(0px)';

      requestAnimationFrame(() => {
        const reelWrap = document.querySelector('.reel-wrap');
        const reelStyle = window.getComputedStyle(reelWrap);
        const paddingLeft = parseFloat(reelStyle.paddingLeft) || 0;
        const targetCard = reelTrack.querySelectorAll('.reel-item')[targetIndex];
        if (!targetCard) return;
        const centerOffset = (reelWrap.clientWidth / 2) - paddingLeft - (targetCard.offsetWidth / 2);
        const idleTarget = -(targetCard.offsetLeft - centerOffset);
        reelTrack.style.transform = 'translateX(' + idleTarget + 'px)';
      });
    }

    function buildSpinStrip(finalItem) {
      const pool = state.currentCase.items;
      const result = [];
      for (let i = 0; i < 42; i += 1) {
        result.push(pool[Math.floor(Math.random() * pool.length)]);
      }
      result[36] = finalItem;
      return result;
    }

    function getBoardForwardOnePrize() {
      return state.currentCase.items.find(item => item.name === '前進一格') || null;
    }

    async function runForwardOneBoardTest() {
      if (state.locked || state.boardMoving) return;
      const forwardOnePrize = getBoardForwardOnePrize();
      if (!forwardOnePrize) return;
      if (!state.boardTestStarted) {
        state.boardTestStarted = true;
        setBoardPosition(1);
        focusBoardForMovement();
        await sleep(650);
      }
      spinOnce(forwardOnePrize, { skipClaim: true });
    }

    async function spinOnce(forcedItem = null, options = {}) {
      if (state.locked) return false;
      state.locked = true;
      const claimedRaffle = options.skipClaim
        ? { remaining: raffleContext.remaining || 0 }
        : await claimRaffleEligibility();
      if (!claimedRaffle) {
        state.locked = false;
        return false;
      }

      const finalItem = forcedItem || pickWithPity();
      const strip = buildSpinStrip(finalItem);
      reelTrack.getAnimations().forEach(animation => animation.cancel());
      reelTrack.style.transition = 'none';
      reelTrack.style.transform = 'translateX(0px)';
      reelTrack.innerHTML = strip.map(makeCard).join('');

      const spinDuration = 14900;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const centerIndex = 36;
          const itemWidth = 168 + 14;
          const reelWrap = document.querySelector('.reel-wrap');
          const reelStyle = window.getComputedStyle(reelWrap);
          const paddingLeft = parseFloat(reelStyle.paddingLeft) || 0;
          const centerOffset = (reelWrap.clientWidth / 2) - paddingLeft - (168 / 2);
          const actualTarget = -((centerIndex * itemWidth) - centerOffset);
          const overshootRatio = 0.18 + (Math.random() * 0.30);
          const overshootDirection = Math.random() < 0.5 ? -1 : 1;
          const overshootTarget = actualTarget + (itemWidth * overshootRatio * overshootDirection);

          const animation = reelTrack.animate(
            [
              { transform: 'translateX(0px)', offset: 0, easing: 'cubic-bezier(.02,.98,.08,1)' },
              { transform: `translateX(${overshootTarget}px)`, offset: 0.965, easing: 'cubic-bezier(.22,.82,.28,1)' },
              { transform: `translateX(${actualTarget}px)`, offset: 1 }
            ],
            {
              duration: spinDuration,
              fill: 'forwards'
            }
          );

          animation.onfinish = () => {
            reelTrack.style.transition = 'none';
            reelTrack.style.transform = `translateX(${actualTarget}px)`;
            state.spins += 1;
            state.history.unshift({
              ...finalItem,
              caseName: state.currentCase.name,
              spinIndex: state.spins
            });
            state.history = state.history.slice(0, 12);
            setLatestDrop(finalItem);
            showRevealCard(finalItem);
            runBoardActionAfterReveal(finalItem);
            if (dropArtEl) {
              dropArtEl.classList.remove('drop-showcase');
              void dropArtEl.offsetWidth;
              dropArtEl.classList.add('drop-showcase');
            }
            triggerPrizeEffect(finalItem);
            if (!options.skipReport) {
              reportGambleResult(finalItem, state.spins, claimedRaffle);
            }
            updateHeader();
            updateHistory();
            state.locked = false;
            refreshRaffleEligibility();

          };
        });
      });
      return true;
    }

    function waitUntilUnlocked() {
      return new Promise(resolve => {
        const timer = window.setInterval(() => {
          if (!state.locked) {
            window.clearInterval(timer);
            resolve();
          }
        }, 150);
      });
    }

    function waitUntilRevealClosed() {
      return new Promise(resolve => {
        const overlay = document.getElementById('revealOverlay');
        if (!overlay || !overlay.classList.contains('active')) {
          resolve();
          return;
        }
        const timer = window.setInterval(() => {
          if (!overlay.classList.contains('active')) {
            window.clearInterval(timer);
            resolve();
          }
        }, 150);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => window.setTimeout(resolve, ms));
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderTenDrawPlaceholders(count) {
      const grid = document.getElementById('tenDrawGrid');
      if (!grid) return;
      grid.innerHTML = Array.from({ length: count }, (_, index) => `
        <article class="ten-card pending" data-index="${index}" style="animation-delay:${index * 70}ms">
          <div class="ten-card-face">
            <div class="ten-card-name">等待揭曉 #${index + 1}</div>
          </div>
        </article>
      `).join('');
    }

    function revealTenDrawCard(index, item, playEffect = true) {
      const grid = document.getElementById('tenDrawGrid');
      const card = grid?.querySelector(`[data-index="${index}"]`);
      if (!card || card.dataset.revealed === 'true') return;
      const face = card.querySelector('.ten-card-face');
      const name = card.querySelector('.ten-card-name');
      card.className = `ten-card revealed ${item.rarity}`;
      card.dataset.revealed = 'true';
      if (face) face.style.backgroundImage = `url('${item.image || '/Gamble/card-back-a.svg'}')`;
      if (name) name.textContent = item.name;
      state.tenDrawRevealedCount += 1;
      setLatestDrop(item);
      if (playEffect) triggerPrizeEffect(item);
      updateTenDrawRevealStatus();
    }

    function animateTenDrawCardInPlace(index, item) {
      return new Promise(resolve => {
        const grid = document.getElementById('tenDrawGrid');
        const card = grid?.querySelector(`[data-index="${index}"]`);
        if (!card || card.dataset.revealed === 'true') {
          resolve();
          return;
        }
        const face = card.querySelector('.ten-card-face');
        const name = card.querySelector('.ten-card-name');
        card.className = `ten-card revealing ${item.rarity}`;
        if (face) face.style.backgroundImage = `url('${item.image || '/Gamble/card-back-a.svg'}')`;
        if (name) name.textContent = item.name;
        const finish = event => {
          if (event.animationName !== 'tenCardLocalRevealSpin') return;
          card.removeEventListener('animationend', finish);
          revealTenDrawCard(index, item, false);
          resolve();
        };
        card.addEventListener('animationend', finish);
      });
    }

    function closeTenDrawOverlay() {
      const overlay = document.getElementById('tenDrawOverlay');
      const hint = document.getElementById('tenDrawClickHint');
      if (overlay) {
        overlay.hidden = true;
        overlay.classList.remove('ready-to-close');
        overlay.classList.remove('ready-to-reveal-screen');
      }
      hint?.classList.remove('is-visible');
      state.tenDrawPromptReady = false;
      if (state.tenDrawPromptTimer) window.clearTimeout(state.tenDrawPromptTimer);
      state.tenDrawPromptTimer = null;
      clearPrizeFlashClasses();
      if (state.tenDrawBoardQueuePending) {
        state.tenDrawBoardQueuePending = false;
        window.setTimeout(() => {
          runTenDrawBoardQueue().catch((error) => console.warn('ten draw board queue failed', error));
        }, 250);
      }
    }

    function showTenDrawHint(text, className) {
      const overlay = document.getElementById('tenDrawOverlay');
      const hint = document.getElementById('tenDrawClickHint');
      if (!overlay || !hint) return;
      state.tenDrawPromptReady = false;
      if (state.tenDrawPromptTimer) window.clearTimeout(state.tenDrawPromptTimer);
      hint.textContent = text;
      hint.classList.remove('is-visible');
      overlay.classList.remove('ready-to-reveal-screen');
      overlay.classList.remove('ready-to-close');
      void hint.offsetWidth;
      if (className) overlay.classList.add(className);
      hint.classList.add('is-visible');
      state.tenDrawPromptTimer = window.setTimeout(() => {
        state.tenDrawPromptReady = true;
      }, 2100);
    }

    function updateTenDrawRevealStatus() {
      const status = document.getElementById('tenDrawStatus');
      const overlay = document.getElementById('tenDrawOverlay');
      if (!status) return;
      const total = state.tenDrawResults.length;
      if (!total) {
        status.textContent = '目前沒有可揭曉的十連抽結果。';
        overlay?.classList.remove('ready-to-close');
        overlay?.classList.remove('ready-to-reveal-screen');
        document.getElementById('tenDrawClickHint')?.classList.remove('is-visible');
        state.tenDrawPromptReady = false;
        return;
      }
      if (state.tenDrawRevealedCount >= total) {
        document.getElementById('tenDrawGrid')?.classList.remove('ready-to-reveal');
        status.textContent = '十連抽全部揭曉。';
        showTenDrawHint('點擊螢幕關閉結果', 'ready-to-close');
        return;
      }
      overlay?.classList.remove('ready-to-close');
      status.textContent = `點擊卡片區開始依序開牌，目前已揭曉 ${state.tenDrawRevealedCount} / ${total} 張。`;
    }

    function revealNextTenDrawCard() {
      const index = state.tenDrawResults.findIndex((_, cardIndex) => {
        const card = document.querySelector(`#tenDrawGrid [data-index="${cardIndex}"]`);
        return card && card.dataset.revealed !== 'true';
      });
      if (index >= 0) revealTenDrawCard(index, state.tenDrawResults[index]);
    }

    async function revealTenDrawSequence() {
      if (!state.tenDrawResults.length || state.tenDrawAutoRevealing || !state.tenDrawPromptReady) return;
      state.tenDrawAutoRevealing = true;
      state.tenDrawPromptReady = false;
      if (state.tenDrawPromptTimer) window.clearTimeout(state.tenDrawPromptTimer);
      state.tenDrawPromptTimer = null;
      document.getElementById('tenDrawOverlay')?.classList.remove('ready-to-reveal-screen');
      document.getElementById('tenDrawGrid')?.classList.remove('ready-to-reveal');
      document.getElementById('tenDrawClickHint')?.classList.remove('is-visible');
      const revealJobs = state.tenDrawResults.map(async (item, index) => {
        await sleep(index * 250);
        triggerPrizeEffect(item);
        await animateTenDrawCardInPlace(index, item);
      });
      await Promise.all(revealJobs);
      state.tenDrawBoardQueuePending = true;
      state.tenDrawAutoRevealing = false;
      updateTenDrawRevealStatus();
    }

    async function openTenDraw() {
      if (state.locked) return;
      state.locked = true;
      setOpenButtonsDisabled(true);
      renderTenDrawPlaceholders(10);
      state.tenDrawResults = [];
      state.tenDrawRevealedCount = 0;
      state.tenDrawAutoRevealing = false;
      const overlay = document.getElementById('tenDrawOverlay');
      const grid = document.getElementById('tenDrawGrid');
      const status = document.getElementById('tenDrawStatus');
      if (overlay) {
        overlay.hidden = false;
        overlay.classList.remove('ready-to-close');
        overlay.classList.remove('ready-to-reveal-screen');
      }
      document.getElementById('tenDrawClickHint')?.classList.remove('is-visible');
      state.tenDrawPromptReady = false;
      if (state.tenDrawPromptTimer) window.clearTimeout(state.tenDrawPromptTimer);
      state.tenDrawPromptTimer = null;
      if (grid) grid.classList.remove('ready-to-reveal');
      if (status) status.textContent = '正在準備十連抽結果，卡片會先保持背面。';

      let preparedCount = 0;
      try {
        for (let i = 0; i < 10; i += 1) {
          const claimedRaffle = await claimRaffleEligibility();
          if (!claimedRaffle) {
            if (status) status.textContent = preparedCount
              ? `第 ${i + 1} 張前資格不足，目前可揭曉 ${preparedCount} 張。請由左往右滑過卡片。`
              : '目前沒有剩餘抽獎資格。';
            break;
          }

          const finalItem = pickWithPity();
          state.spins += 1;
          state.history.unshift({
            ...finalItem,
            caseName: state.currentCase.name,
            spinIndex: state.spins
          });
          state.history = state.history.slice(0, 12);

          const report = await reportGambleResult(finalItem, state.spins, claimedRaffle);
          if (report?.raffle) raffleContext.raffle = report.raffle;
          if (report?.order?.customer) raffleContext.customer = String(report.order.customer || '').trim();
          updateHeader();
          updateHistory();
          state.tenDrawResults.push(finalItem);
          preparedCount += 1;
        }
      } catch (error) {
        console.warn('ten draw failed', error);
        if (status) status.textContent = '十連抽中途連線失敗，請確認伺服器狀態後再試一次。';
      } finally {
        state.forceDemoNextSpin = false;
        state.locked = false;
        await refreshRaffleEligibility();
      }

      if (preparedCount > 0) {
        document.getElementById('tenDrawGrid')?.classList.add('ready-to-reveal');
        showTenDrawHint('點擊螢幕翻卡', 'ready-to-reveal-screen');
        updateTenDrawRevealStatus();
      }
    }

    async function openMultiple(count) {
      if (state.locked) return;
      const useDemoOrder = count === 9;
      if (useDemoOrder) state.demoIndex = 0;
      for (let i = 0; i < count; i += 1) {
        if (useDemoOrder) state.forceDemoNextSpin = true;
        const started = await spinOnce();
        if (!started) break;
        await waitUntilUnlocked();
        if (count > 1) await waitUntilRevealClosed();
      }
      state.forceDemoNextSpin = false;
    }

    function switchCase(id) {
      if (state.locked) return;
      state.currentCase = CASES.find(box => box.id === id) || CASES[0];
      state.pity = 0;
      updateCaseSelector();
      updatePool();
      updateHeader();
      renderIdleStrip();
    preloadGambleImages();
    }

    caseSelector.addEventListener('click', event => {
      const button = event.target.closest('[data-case]');
      if (!button) return;
      switchCase(button.dataset.case);
    });

    function handleTenDrawPromptClick() {
      const overlay = document.getElementById('tenDrawOverlay');
      if (!state.tenDrawPromptReady) return;
      if (overlay?.classList.contains('ready-to-close')) {
        closeTenDrawOverlay();
        return;
      }
      if (overlay?.classList.contains('ready-to-reveal-screen')) {
        revealTenDrawSequence();
      }
    }

    document.getElementById('openOnceBtn').addEventListener('click', () => openMultiple(1));
    document.getElementById('openTenBtn')?.addEventListener('click', openTenDraw);
    document.getElementById('testForwardOneBtn')?.addEventListener('click', runForwardOneBoardTest);
    document.getElementById('tenDrawCloseBtn')?.addEventListener('click', closeTenDrawOverlay);
    document.getElementById('tenDrawGrid')?.addEventListener('click', handleTenDrawPromptClick);
    document.getElementById('tenDrawGrid')?.addEventListener('touchstart', handleTenDrawPromptClick, { passive: true });
    document.getElementById('tenDrawOverlay')?.addEventListener('click', handleTenDrawPromptClick);
    window.setInterval(() => {
      if (!state.locked) refreshRaffleEligibility();
    }, 5000);


    updateCaseSelector();
    updatePool();
    updateHeader();
    updateHistory();
    bindBoardControls();
    renderIdleStrip();
    preloadGambleImages();
  </script>
  <div class="reveal-overlay" id="revealOverlay" aria-hidden="true">
    <div class="reveal-backdrop"></div>
    <div class="reveal-card-wrap">
      <div class="reveal-card" id="revealCard">
        <div class="reveal-card-face reveal-card-front">
          <div class="reveal-front-shell">
            <div class="reveal-front-art" id="revealFrontArt">?</div>
            <div class="reveal-front-meta">
              <div class="reveal-front-label" id="revealFrontLabel">神秘卡片</div>
              <div class="reveal-front-sub" id="revealFrontSub">準備翻面揭示</div>
            </div>
          </div>
        </div>
        <div class="reveal-card-face reveal-card-back">
          <div class="drop-art" id="revealArt"></div>
          <div class="reveal-info">
            <div class="reveal-name" id="revealName">等待抽獎</div>
            <div class="reveal-rarity" id="revealRarity">一般</div>
          </div>
        </div>
      </div>
      <div class="reveal-click-hint">點擊螢幕關閉卡片</div>
    </div>
  </div>

</body>
</html>
