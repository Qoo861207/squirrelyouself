<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>範例公告 | 詳細公告樣板</title>
  <style>
    :root {
      --bg: #f6efe7;
      --paper: rgba(255, 252, 247, 0.94);
      --ink: #36241d;
      --muted: #6f5c53;
      --accent: #9a4d3a;
      --line: rgba(120, 78, 58, 0.14);
      --shadow: 0 20px 46px rgba(95, 64, 48, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(182, 132, 98, 0.18), transparent 28%),
        radial-gradient(circle at right, rgba(217, 182, 143, 0.18), transparent 24%),
        linear-gradient(180deg, #f8f2eb 0%, var(--bg) 100%);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .notice-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 36px;
    }

    .notice-tag {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(154, 77, 58, 0.1);
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.12;
    }

    .notice-meta {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .notice-body {
      color: var(--ink);
      line-height: 1.95;
      font-size: 1.04rem;
    }

    .notice-body p {
      margin: 0 0 18px;
    }

    .notice-body ul {
      margin: 0 0 20px;
      padding-left: 1.2rem;
      line-height: 1.9;
    }

    .notice-actions {
      margin-top: 34px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .button.primary {
      background: var(--accent);
      color: #fff;
    }

    .button.secondary {
      border: 1px solid rgba(120, 78, 58, 0.16);
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
    }

    .button:hover {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <article class="notice-card">
      <div class="notice-tag">SAMPLE NOTICE</div>
      <h1>這裡改成你的公告標題</h1>
      <p class="notice-meta">公告日期：2026/04/20</p>

      <div class="notice-body">
        <p>這裡是公告第一段，適合放活動開始時間、合作內容，或本次公告最重要的資訊。</p>
        <p>這裡是第二段，可以補充使用方式、參加資格、注意事項，或客人需要知道的說明。</p>
        <ul>
          <li>這裡可以改成活動規則 1</li>
          <li>這裡可以改成活動規則 2</li>
          <li>這裡可以改成活動規則 3</li>
        </ul>
        <p>最後一段可以補充備註，或提醒客人以最新公告內容為準。</p>
      </div>

      <div class="notice-actions">
        <a class="button secondary" href="../index.html">返回首頁</a>
        <a class="button primary" href="https://docs.google.com/forms/d/e/1FAIpQLScu11dW91wQFvIWU6v9doXW8m_yNeBEmzT98bOcQL1wLDUxww/viewform" target="_blank" rel="noopener noreferrer">立即點餐</a>
      </div>
    </article>
  </div>
</body>
</html>
