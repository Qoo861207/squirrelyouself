<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>豆花酒吧改建公告｜松你去鼠</title>
  <style>
    :root {
      --bg: #f5eee7;
      --panel: #fffaf5;
      --ink: #2b211d;
      --muted: #76665c;
      --accent: #a7553f;
      --line: #eadbd1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(167, 85, 63, 0.12), transparent 28%),
        linear-gradient(135deg, #f8f1ea 0%, #efe1d6 100%);
      line-height: 1.9;
    }

    main {
      width: min(900px, calc(100% - 40px));
      margin: 64px auto;
      background: rgba(255, 250, 245, 0.94);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: clamp(28px, 5vw, 56px);
      box-shadow: 0 24px 60px rgba(75, 50, 38, 0.14);
    }

    .eyebrow {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 26px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .date {
      display: inline-flex;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fff;
      margin-bottom: 28px;
    }

    p { margin: 0 0 18px; font-size: 18px; }

    .notice-box {
      margin: 28px 0;
      padding: 22px 24px;
      border-left: 5px solid var(--accent);
      border-radius: 18px;
      background: #fff7f0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      padding: 12px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 12px 26px rgba(167, 85, 63, 0.24);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Notice</div>
    <h1>豆花酒吧改建公告</h1>
    <div class="date">公告日期：2026/05/25</div>

    <p>親愛的客人您好：</p>

    <div class="notice-box">
      <p>合作夥伴「豆花酒吧」目前因店面改建中，暫時不對外開放。</p>
      <p>開放時間將另行通知，若後續有新的營業資訊，本店也會於官網公告區同步更新。</p>
    </div>

    <p>造成不便敬請見諒，也感謝各位客人的理解與等待。</p>
    <p>松你去鼠 敬上</p>

    <a class="back-link" href="../index.html#notices">返回公告區</a>
  </main>
</body>
</html>
