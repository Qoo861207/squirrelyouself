<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>品項價格調整公告｜松你去鼠</title>
  <style>
    :root {
      --bg: #efe7dc;
      --paper: #fffaf4;
      --ink: #2c211d;
      --muted: #7f6a5c;
      --accent: #9f523d;
      --line: #e8d8c9;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top left, #fffaf4 0, var(--bg) 45%, #e7d8c8 100%);
      color: var(--ink);
      line-height: 1.9;
    }

    .notice-page {
      width: min(920px, calc(100% - 32px));
      margin: 48px auto;
      padding: 44px clamp(24px, 6vw, 72px);
      background: rgba(255, 250, 244, 0.94);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(72, 49, 36, 0.14);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.12;
      letter-spacing: -0.04em;
    }

    .date {
      display: inline-flex;
      margin-bottom: 28px;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fffdf9;
      font-weight: 700;
    }

    p {
      margin: 0 0 18px;
      font-size: 18px;
    }

    .box {
      margin: 28px 0;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fffdf9;
    }

    .price-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .price-list li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      font-size: 18px;
    }

    .price-list li:last-child {
      border-bottom: 0;
    }

    .price-list strong,
    .box strong {
      color: var(--accent);
    }

    .back-link {
      display: inline-flex;
      margin-top: 28px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(159, 82, 61, 0.22);
    }
  </style>
</head>
<body>
  <main class="notice-page">
    <p class="eyebrow">Official Notice</p>
    <h1>品項價格調整公告</h1>
    <div class="date">公告日期：2026/05/19</div>

    <p>親愛的客人您好：</p>
    <p>因近期店內員(ㄖㄨㄥˇ)工(ㄩㄢˊ)過多，營運成本與獎金池活動同步調整，本店將即日起進行品項價格調整，詳細如下：</p>
    <div class="box">
      <ul class="price-list">
        <li><span>主餐</span><strong>8,000G → 16,000G</strong></li>
        <li><span>甜點與輕食</span><strong>6,000G → 14,000G</strong></li>
        <li><span>飲品</span><strong>5,000G → 8,000G</strong></li>
        <li><span>酒類</span><strong>4,000G → 8,000G</strong></li>
      </ul>
    </div>

    <p>調整後的價格將用於維持店內服務、員工分潤與後續活動獎池。感謝各位客人的理解與支持，也謝謝大家願意繼續陪松你去鼠一起把店慢慢做得更好。</p>
    <p>松你去鼠 敬上</p>

    <a class="back-link" href="../index.html#news">返回公告區</a>
  </main>
</body>
</html>
