<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5/24 轉蛋活動新增公告｜松你去鼠</title>
  <style>
    :root {
      --bg: #efe7dc;
      --paper: #fffaf4;
      --ink: #2c211d;
      --muted: #7f6a5c;
      --accent: #9f523d;
      --line: #e8d8c9;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at top left, #fffaf4 0, var(--bg) 45%, #e7d8c8 100%);
      color: var(--ink);
      line-height: 1.9;
    }

    .notice-page {
      width: min(920px, calc(100% - 32px));
      margin: 48px auto;
      padding: 44px clamp(24px, 6vw, 72px);
      background: rgba(255, 250, 244, 0.94);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: 0 24px 70px rgba(72, 49, 36, 0.14);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.12;
      letter-spacing: -0.04em;
    }

    .date {
      display: inline-flex;
      margin-bottom: 28px;
      padding: 8px 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: #fffdf9;
      font-weight: 700;
    }

    p {
      margin: 0 0 18px;
      font-size: 18px;
    }

    .box {
      margin: 28px 0;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #fffdf9;
    }

    .box strong {
      color: var(--accent);
    }

    .back-link {
      display: inline-flex;
      margin-top: 28px;
      padding: 12px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(159, 82, 61, 0.22);
    }
  </style>
</head>
<body>
  <main class="notice-page">
    <p class="eyebrow">Official Notice</p>
    <h1>5/24 轉蛋活動新增公告</h1>
    <div class="date">公告日期：2026/05/19</div>

    <p>親愛的客人您好：</p>
    <p>本店預計於 <strong>2026/05/24</strong> 起新增轉蛋活動，讓用餐後的結尾多一點期待感。</p>

    <div class="box">
      <p><strong>參加方式：</strong>單桌消費每滿 <strong>50,000G</strong>，即可獲得一次抽獎資格。</p>
      <p><strong>計算方式：</strong>首次點餐與追加點餐金額會合併計算，可抽次數以現場後台紀錄為準。</p>
      <p><strong>獎項內容：</strong>活動獎項包含折價卷、再抽一次、Gil 獎勵等內容；實際獎項與機率將以活動當日公告與系統顯示為準。</p>
    </div>

    <p>感謝各位一直以來的支持，也祝大家都能把好運帶回座位，抽到自己想要的大獎。</p>
    <p>松你去鼠 敬上</p>

    <a class="back-link" href="../index.html#news">返回公告區</a>
  </main>
</body>
</html>
