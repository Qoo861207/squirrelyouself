<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <style>
    :root {
      --bg: #f6efe7;
      --panel: rgba(255, 250, 244, 0.94);
      --line: rgba(138, 92, 64, 0.18);
      --text: #3a2a22;
      --muted: #8a6b58;
      --accent: #b46845;
      --accent-dark: #8f5034;
      --accent-soft: rgba(180, 104, 69, 0.12);
      --disabled: #ece1d6;
      --shadow: 0 22px 50px rgba(111, 72, 48, 0.14);
      --radius-xl: 30px;
      --radius-lg: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(220, 184, 154, 0.55), transparent 26%),
        radial-gradient(circle at left center, rgba(228, 204, 178, 0.38), transparent 24%),
        linear-gradient(180deg, #f9f3eb 0%, #f6efe7 100%);
    }
    .page {
      width: min(1420px, calc(100% - 32px));
      margin: 22px auto 48px;
    }
    .topbar, .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      border-radius: var(--radius-xl);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand small {
      display: block;
      color: var(--accent);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0.03em;
    }
    .brand-divider {
      font-size: 2.6rem;
      color: rgba(138, 92, 64, 0.35);
      font-weight: 300;
    }
    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }
    .top-actions a,
    .summary-actions button,
    .chip,
    .seat-button,
    .qty button {
      font-family: inherit;
    }
    .top-actions a,
    .summary-actions button {
      appearance: none;
      border: 1px solid rgba(180, 104, 69, 0.2);
      background: #fffaf6;
      color: var(--accent-dark);
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      box-shadow: 0 12px 24px rgba(143, 80, 52, 0.08);
    }
    .top-actions a:hover,
    .summary-actions button:hover,
    .chip:hover,
    .seat-button:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 22px rgba(143, 80, 52, 0.14);
    }
    .top-actions a:active,
    .summary-actions button:active,
    .chip:active,
    .seat-button:active {
      animation: action-pop 0.22s ease;
    }
    .summary-actions .primary {
      background: linear-gradient(135deg, #b96e49 0%, #9f5738 100%);
      color: #fffdf8;
      border-color: transparent;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.74fr);
      gap: 24px;
      margin-top: 24px;
      align-items: start;
    }
    .stack { display: grid; gap: 24px; }
    .panel {
      border-radius: var(--radius-xl);
      padding: 22px;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .panel-head h2 {
      margin: 0;
      font-size: clamp(1.9rem, 3vw, 2.8rem);
      line-height: 1.02;
    }
    .panel-head p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
    }
    .seat-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(320px, 0.82fr);
      gap: 20px;
      align-items: start;
    }
    .seat-side {
      display: grid;
      gap: 16px;
    }
    .seat-groups {
      display: grid;
      gap: 18px;
    }
    .seat-group-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .seat-group-head h4 {
      margin: 0;
      font-size: 1rem;
    }
    .seat-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .seat-button {

      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(181, 133, 96, 0.2);
      background: #fffdfb;
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 0.97rem;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }
    .seat-button.selected {
      background: linear-gradient(135deg, #b96e49 0%, #9f5738 100%);
      color: #fffdf8;
      border-color: transparent;
    }
    .seat-button:disabled {
      background: var(--disabled);
      color: rgba(138, 107, 88, 0.55);
      border-color: transparent;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .seat-summary {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    .map-card {
      padding: 14px;
      border-radius: 24px;
      background: rgba(255,252,248,0.84);
      border: 1px solid rgba(181,133,96,0.14);
    }
    .map-card img {
      display: block;
      width: 100%;
      border-radius: 18px;
    }
    .summary-box,
    .summary-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 252, 248, 0.94);
      border: 1px solid rgba(181, 133, 96, 0.14);
    }
    .summary-box span,
    .summary-item span {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .summary-box strong { font-size: 1.24rem; }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      color: var(--accent-dark);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;

    .chip.active {
      background: var(--accent-dark);
      color: #fffaf5;
      border-color: transparent;
    }
    .menu-groups { display: grid; gap: 26px; }
    .menu-group h3 {
      margin: 0 0 16px;
      font-size: 1.18rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .menu-card {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,253,249,0.95);
      border: 1px solid rgba(181,133,96,0.16);
    }
    .menu-card img {
      width: 92px;
      height: 92px;
      object-fit: cover;
      border-radius: 18px;
      background: linear-gradient(135deg, #f0dfcb 0%, #ead4bc 100%);

    .menu-card h4 {

      font-size: 1.35rem;
    }

      color: var(--muted);
      line-height: 1.6;
      font-size: 0.94rem;
    }
    .meta {

      flex-wrap: wrap;
      gap: 10px;
      color: var(--accent-dark);
      font-weight: 800;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 0.78rem;
      font-weight: 700;
    }
    .qty {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fffdfb;
      min-width: 118px;
      justify-content: center;
    }
    .qty button {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(180, 104, 69, 0.12);
      color: var(--accent-dark);
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      will-change: transform;
    }
    .qty button:hover {
      transform: scale(1.18);
      background: rgba(180, 104, 69, 0.18);
      box-shadow: 0 8px 18px rgba(143, 80, 52, 0.14);
    }
    .qty button:active {
      animation: qty-pop 0.22s ease;
      background: rgba(180, 104, 69, 0.22);
    }
    .qty strong {
      min-width: 30px;
      text-align: center;
      font-size: 1.04rem;
      cursor: pointer;
      user-select: none;
      border-radius: 999px;
      padding: 4px 8px;
      transition: background 0.16s ease, transform 0.16s ease;
    }
    .qty strong:hover {
      background: rgba(180, 104, 69, 0.12);
      transform: scale(1.08);
    }
    @keyframes qty-pop {
      0% {
        transform: scale(1.18);
      }
      45% {
        transform: scale(1.38);
      }
      100% {
        transform: scale(1);
      }
    }
    @keyframes action-pop {
      0% {
        transform: scale(1.06);
      }
      45% {
        transform: scale(1.16);
      }
      100% {
        transform: scale(1);
      }
    }
    .summary-card {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 18px;
    }
    .summary-grid { display: grid; gap: 12px; }
    .summary-item strong {
      font-size: 1.32rem;
      color: var(--text);
    }
    .summary-list {
      max-height: 240px;
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 8px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,252,247,0.9);
      border: 1px solid rgba(181,133,96,0.12);
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .summary-empty {

      line-height: 1.6;
      font-size: 0.94rem;
    }
    .summary-actions { display: grid; gap: 10px; }
    .feedback {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(181,133,96,0.16);
      background: rgba(255,252,248,0.9);
      font-size: 0.94rem;
      line-height: 1.6;
      color: var(--muted);
      min-height: 58px;
    }
    .feedback.error {

      background: rgba(220,91,76,0.08);
      border-color: rgba(220,91,76,0.18);
    }
    .feedback.success {
      color: #3d744a;
      background: rgba(83,173,104,0.09);
      border-color: rgba(83,173,104,0.18);
    }
    @media (max-width: 1220px) {

    }
    @media (max-width: 820px) {

      .qty { grid-column: 1 / -1; width: fit-content; }
      .seat-summary { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .page { width: min(100% - 18px, 100%); }

      .brand-divider { display: none; }
      .brand h1 { font-size: 2.5rem; }
      .panel-head h2 { font-size: 2.1rem; }
    }
  </style>
</head>

          { name: "\u54c8\u5229\u5361\u7d0d\u8607\u65af\u5348\u8336\u7d44\u5408", price: 14000, image: "/menu-assets-webp/\u54c8\u5229\u5361\u7d0d\u8607\u65af\u5348\u8336\u7d44\u5408.webp", desc: "\u5348\u8336\u611f\u5b8c\u6574\uff0c\u6c23\u6c1b\u5f88\u597d\u3002" },
          { name: "\u5947\u5999\u82ad\u83f2", price: 14000, image: "/menu-assets-webp/\u5947\u5999\u82ad\u83f2.webp", desc: "\u8996\u89ba\u611f\u5f37\uff0c\u751c\u9ede\u4ee3\u8868\u4e4b\u4e00\u3002" },
          { name: "\u96ea\u9802\u83ab\u53e4\u6ce1\u6ce1\u51b0", price: 14000, image: "/menu-assets-webp/\u96ea\u9802\u83ab\u53e4\u6ce1\u6ce1\u51b0.webp", desc: "\u9069\u5408\u60f3\u4f86\u4e00\u9ede\u8f15\u6dbc\u611f\u7684\u5ba2\u4eba\u3002" },
          { name: "\u5e03\u4e01\u5e03\u4e01", price: 14000, image: "/menu-assets-webp/\u5e03\u4e01\u5e03\u4e01.webp", desc: "\u7c21\u55ae\u53ef\u611b\uff0c\u9069\u5408\u6536\u5c3e\u9ede\u5fc3\u3002" }
        ]
      },
      {
        key: "drink",
        title: TXT.drink,
        items: [
          { name: "\u51b0\u93ae\u679c\u6c41", price: 8000, image: "/menu-assets-webp/\u51b0\u93ae\u679c\u6c41.webp", desc: "\u7d93\u5178\u6e05\u723d\u6b3e\uff0c\u9069\u5408\u914d\u9910\u3002" },
          { name: "\u6ffe\u639b\u5f0f\u5496\u5561", price: 8000, image: "/menu-assets-webp/\u6ffe\u639b\u5f0f\u5496\u5561.webp", desc: "\u7c21\u55ae\u4fca\u843d\uff0c\u559c\u6b61\u5496\u5561\u53ef\u4ee5\u76f4\u63a5\u9078\u3002" },
          { name: "\u5de7\u514b\u529b\u99ac\u514b\u676f", price: 8000, image: "/menu-assets-webp/\u5de7\u514b\u529b\u99ac\u514b\u676f.webp", desc: "\u751c\u53e3\u71b1\u98f2\uff0c\u9069\u5408\u6162\u6162\u559d\u3002" }
        ]
      },
      {
        key: "alcohol",
        title: TXT.alcohol,
        items: [
          { name: "\u5de8\u5320\u85e5\u9152", price: 8000, image: "/menu-assets-webp/\u5de8\u5320\u85e5\u9152.webp", desc: "\u5427\u6aaf\u4f9b\u61c9\u9152\u6b3e\uff0c\u9069\u5408\u60f3\u5c0f\u914c\u4e00\u676f\u3002" },
          { name: "\u51cd\u9727\u96de\u5c3e\u9152", price: 8000, image: "/menu-assets-webp/\u51cd\u9727\u96de\u5c3e\u9152.webp", desc: "\u504f\u6e05\u723d\u8abf\u6027\uff0c\u98a8\u683c\u611f\u6bd4\u8f03\u9bae\u660e\u3002" },
          { name: "\u84bc\u5929\u86cb\u5976\u9152", price: 8000, image: "/menu-assets-webp/\u84bc\u5929\u86cb\u5976\u9152.webp", desc: "\u53e3\u611f\u66f4\u67d4\u548c\uff0c\u9069\u5408\u6162\u6162\u559d\u3002" },
          { name: "\u99ac\u85a9\u62c9\u5976\u8336", price: 8000, image: "/menu-assets-webp/\u99ac\u85a9\u62c9\u5976\u8336.webp", desc: "\u6eab\u6f64\u9999\u6c23\u578b\uff0c\u9069\u5408\u642d\u914d\u804a\u5929\u7bc0\u594f\u3002" },
          { name: "\u854e\u9ea5\u8336", price: 8000, image: "/menu-assets-webp/\u854e\u9ea5\u8336.webp", desc: "\u6e05\u723d\u4e0d\u6436\u5473\uff0c\u9069\u5408\u60f3\u653e\u9b06\u4e00\u4e0b\u3002" }
        ]
      },
      {
        key: "gamble",
        title: TXT.gamble,
        items: [
          { name: "\u62bd\u734e\u8f49\u86cb", price: 50000, image: "/Gamble/Bside-lite.jpg", desc: "\u53ef\u7372\u5f97 1 \u6b21\u677e\u4f60\u53bb\u9f20\u734e\u91d1\u6c60\u62bd\u734e\u6a5f\u6703\u3002" }
        ]
      }
    ];

    const state = {
      quantities: Object.fromEntries(menuGroups.flatMap(group => group.items.map(item => [item.name, 0]))),
      seats: [],
      selectedSeat: "",
      currentSeatOrder: null,
      currentSeatSummary: null
    };

    const appendBarSeatsEl = document.getElementById("append-bar-seats");
    const appendTableSeatsEl = document.getElementById("append-table-seats");
    const appendSeatLabelTopEl = document.getElementById("append-seat-label-top");
    const seatCustomerEl = document.getElementById("seat-customer");
    const menuChipsEl = document.getElementById("menu-chips");
    const menuGroupsEl = document.getElementById("menu-groups");
    const appendTotalPriceEl = document.getElementById("append-total-price");
    const appendSeatLabelEl = document.getElementById("append-seat-label");
    const summaryListEl = document.getElementById("summary-list");
    const summaryEmptyEl = document.getElementById("summary-empty");
    const feedbackBoxEl = document.getElementById("feedback-box");
    const submitAppendEl = document.getElementById("submit-append");
    const resetAppendEl = document.getElementById("reset-append");

    function setFeedback(text, type) {
      feedbackBoxEl.textContent = text;
      feedbackBoxEl.className = type ? "feedback " + type : "feedback";
    }

    function getBadge(groupKey) {
      if (groupKey === "main") return TXT.badgeMain;
      if (groupKey === "dessert") return TXT.badgeDessert;
      if (groupKey === "drink") return TXT.badgeDrink;
      if (groupKey === "alcohol") return TXT.badgeAlcohol;
      return TXT.badgeGamble;
    }

    function scrollToGroup(key) {
      const target = document.getElementById("group-" + key);
      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }
      document.querySelectorAll(".chip").forEach(function(chip) {
        chip.classList.toggle("active", chip.dataset.key === key);
      });
    }
    const MAX_ITEM_QTY = 99;

    function clampMenuQuantity(value) {
      const quantity = Number.parseInt(value, 10);
      if (!Number.isFinite(quantity) || quantity <= 0) return 0;
      return Math.min(quantity, MAX_ITEM_QTY);
    }

    function bindQuantityHold(button, onStep) {
      let holdDelay = null;
      let repeatTimer = null;
      let longPressed = false;

      function stopHold() {
        if (holdDelay) window.clearTimeout(holdDelay);
        if (repeatTimer) window.clearInterval(repeatTimer);
        holdDelay = null;
        repeatTimer = null;
      }

      button.addEventListener("click", function() {
        if (longPressed) {
          longPressed = false;
          return;
        }
        onStep();
      });

      function startHold() {
        stopHold();
        longPressed = false;
        holdDelay = window.setTimeout(function() {
          longPressed = true;
          onStep();
          repeatTimer = window.setInterval(onStep, 85);
        }, 330);
      }

      button.addEventListener("mousedown", startHold);
      button.addEventListener("touchstart", startHold, { passive: true });
      ["mouseup", "mouseleave", "touchend", "touchcancel", "blur"].forEach(function(eventName) {
        button.addEventListener(eventName, stopHold);
      });

      button.addEventListener("keydown", function(event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          onStep();
        }
      });
    }

    function createMenuCard(item, groupKey) {
      const card = document.createElement("article");
      card.className = "menu-card";

      const image = document.createElement("img");
      image.src = item.image;
      image.alt = item.name;
      image.loading = "lazy";

      const info = document.createElement("div");
      info.innerHTML =
        "<h4>" + item.name + "</h4>" +
        "<p>" + item.desc + "</p>" +
        "<div class=\"meta\"><span>" + item.price.toLocaleString() + " G</span><span class=\"badge\">" + getBadge(groupKey) + "</span></div>";

      const qty = document.createElement("div");
      qty.className = "qty";
      qty.innerHTML = "<button type=\"button\" aria-label=\"減少數量\">-</button><strong tabindex=\"0\" role=\"button\" title=\"點擊輸入數量\">0</strong><button type=\"button\" aria-label=\"增加數量\">+</button>";

      const minusButton = qty.children[0];
      const countEl = qty.children[1];
      const plusButton = qty.children[2];

      function setItemQuantity(value) {
        state.quantities[item.name] = clampMenuQuantity(value);
        countEl.textContent = String(state.quantities[item.name]);
        updateSummary();
      }

      function stepItemQuantity(delta) {
        setItemQuantity((state.quantities[item.name] || 0) + delta);
      }

      function askItemQuantity() {
        const current = state.quantities[item.name] || 0;
        const input = window.prompt("輸入「" + item.name + "」數量（1-99，留空或 0 代表取消）", current || 1);
        if (input === null) return;
        setItemQuantity(input);
      }

      bindQuantityHold(minusButton, function() { stepItemQuantity(-1); });
      bindQuantityHold(plusButton, function() { stepItemQuantity(1); });
      countEl.addEventListener("click", askItemQuantity);
      countEl.addEventListener("keydown", function(event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          askItemQuantity();
        }
      });

      card.appendChild(image);
      card.appendChild(info);
      card.appendChild(qty);
      return card;
    }

    function renderMenu() {
      menuChipsEl.innerHTML = "";
      menuGroupsEl.innerHTML = "";

      menuGroups.forEach(function(group, index) {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = index === 0 ? "chip active" : "chip";
        chip.dataset.key = group.key;
        chip.textContent = group.title;
        chip.addEventListener("click", function() {
          scrollToGroup(group.key);
        });
        menuChipsEl.appendChild(chip);

        const section = document.createElement("section");
        section.className = "menu-group";
        section.id = "group-" + group.key;
        section.innerHTML = "<h3>" + group.title + "</h3>";

        const cards = document.createElement("div");
        cards.className = "cards";
        group.items.forEach(function(item) {
          cards.appendChild(createMenuCard(item, group.key));
        });
        section.appendChild(cards);
        menuGroupsEl.appendChild(section);
      });
    }

    function getSelectedItems() {
      const items = [];
      menuGroups.forEach(function(group) {
        group.items.forEach(function(item) {
          const quantity = state.quantities[item.name];
          if (quantity > 0) {
            items.push({
              name: item.name,
              price: item.price,
              quantity: quantity,
              total: item.price * quantity
            });
          }
        });
      });
      return items;
    }

    function updateSummary() {
      const items = getSelectedItems();
      const total = items.reduce(function(sum, item) {
        return sum + item.total;
      }, 0);

      appendTotalPriceEl.textContent = total.toLocaleString() + " G";
      appendSeatLabelEl.textContent = state.selectedSeat || TXT.noSeat;
      appendSeatLabelTopEl.textContent = state.selectedSeat || TXT.appendSeatNone;
      summaryListEl.innerHTML = "";

      if (items.length === 0) {
        summaryEmptyEl.style.display = "block";
      } else {
        summaryEmptyEl.style.display = "none";
        items.forEach(function(item) {
          const row = document.createElement("div");
          row.className = "summary-row";
          row.innerHTML = "<span>" + item.name + " × " + item.quantity + "</span><strong>" + item.total.toLocaleString() + " G</strong>";
          summaryListEl.appendChild(row);
        });
      }
    }

    function updateSeatSummary() {
      if (!state.currentSeatOrder || !state.currentSeatSummary) {
        seatCustomerEl.textContent = TXT.noSeat;
        return;
      }

      seatCustomerEl.textContent = state.currentSeatOrder.customer || state.selectedSeat;
    }

    function buildAppendSeatButton(row) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = state.selectedSeat === row.name ? "seat-button selected" : "seat-button";
      button.textContent = row.name;
      button.addEventListener("click", function() {
        state.selectedSeat = row.name;
        renderSeatButtons();
        updateSummary();
        loadSeatDetail(row.name);
        setFeedback(TXT.feedbackSeatPrefix + row.name);
      });
      return button;
    }

    function renderSeatButtons() {
      appendBarSeatsEl.innerHTML = "";
      appendTableSeatsEl.innerHTML = "";
      const occupiedSeats = (state.seats || []).filter(function(row) {
        return row.status === "occupied";
      });

      const occupiedMap = Object.fromEntries(occupiedSeats.map(function(row) {
        return [row.name, row];
      }));

      ["BAR1","BAR2","BAR3","BAR4","BAR5","BAR6","BAR7","BAR8"].forEach(function(name) {
        if (occupiedMap[name]) {
          appendBarSeatsEl.appendChild(buildAppendSeatButton(occupiedMap[name]));
        }
      });

      ["T1","T2","T3"].forEach(function(name) {
        if (occupiedMap[name]) {
          appendTableSeatsEl.appendChild(buildAppendSeatButton(occupiedMap[name]));
        }
      });

    }

    async function loadSeats() {
      try {
        const response = await fetch("/tables");
        state.seats = await response.json();
        renderSeatButtons();

        if (state.selectedSeat) {
          const selectedStillOccupied = state.seats.some(function(row) {
            return row.name === state.selectedSeat && row.status === "occupied";
          });
          if (!selectedStillOccupied) {
            state.selectedSeat = "";
            state.currentSeatOrder = null;
            state.currentSeatSummary = null;
            renderSeatButtons();
            updateSeatSummary();
            updateSummary();
          }
        }
      } catch (error) {
        setFeedback(TXT.feedbackSeatReadFail, "error");
      }
    }

    async function loadSeatDetail(seatName) {
      try {
        const orderRes = await fetch("/seat-order/" + encodeURIComponent(seatName));
        const itemsRes = await fetch("/seat-order-items/" + encodeURIComponent(seatName));
        const orderData = await orderRes.json();
        const itemsData = await itemsRes.json();

        state.currentSeatOrder = orderData.order || null;
        state.currentSeatSummary = itemsData.summary || null;
        updateSeatSummary();
      } catch (error) {
        state.currentSeatOrder = null;
        state.currentSeatSummary = null;
        updateSeatSummary();
        setFeedback(TXT.feedbackOrderReadFail, "error");
      }
    }

    function resetAppend() {
      Object.keys(state.quantities).forEach(function(key) {
        state.quantities[key] = 0;
      });
      renderMenu();
      updateSummary();
      setFeedback(TXT.feedbackReset);
    }

    async function submitAppend() {
      const items = getSelectedItems();

      if (!state.selectedSeat) {
        setFeedback(TXT.feedbackNeedSeat, "error");
        return;
      }
      if (!state.currentSeatOrder) {
        setFeedback(TXT.feedbackNeedOrder, "error");
        return;
      }
      if (!items.length) {
        setFeedback(TXT.feedbackNeedItem, "error");
        return;
      }

      const subtotal = items.reduce(function(sum, item) {
        return sum + item.total;
      }, 0);

      const payload = {
        customer: state.currentSeatOrder.customer || state.selectedSeat,
        people: Number(state.currentSeatOrder.people || 1),
        table_name: state.selectedSeat,
        items: items.map(function(item) {
          return item.name + " x" + item.quantity;
        }).join(", "),
        note: "",
        total: subtotal,
        is_append: 1,
        append_from_order_id: Number((state.currentSeatSummary && state.currentSeatSummary.latestOrderId) || (state.currentSeatOrder && state.currentSeatOrder.id) || 0)
      };

      submitAppendEl.disabled = true;
      setFeedback(TXT.feedbackSending);

      try {
        const response = await fetch("/order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(data.message || "Append order failed");
        }

        resetAppend();
        await loadSeats();
        await loadSeatDetail(state.selectedSeat);
        setFeedback(TXT.feedbackSuccessPrefix + state.selectedSeat + TXT.feedbackSuccessSuffix, "success");
      } catch (error) {
        setFeedback(error.message || "Append order failed", "error");
      } finally {
        submitAppendEl.disabled = false;
      }
    }

    submitAppendEl.addEventListener("click", submitAppend);
    resetAppendEl.addEventListener("click", resetAppend);

    renderMenu();
    updateSummary();
    updateSeatSummary();
    loadSeats();
    setInterval(loadSeats, 3000);
  </script>
</body>
</html>
